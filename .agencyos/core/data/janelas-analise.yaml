# Janelas de analise para decisoes de trafego
# Referencia para @traffic ao tomar decisoes baseadas em dados

janelas:
  diaria:
    periodo: "1 dia"
    uso: "Apenas desvios graves e emergencias"
    acoes_permitidas:
      - "Pausar campanha com gasto 3x acima do custo esperado sem resultado"
      - "Pausar criativo com CPL 5x acima da meta"
      - "Aumentar budget se campanha esgotou verba antes do fim do dia"
    acoes_proibidas:
      - "Pausar criativo por performance abaixo da media"
      - "Mudar publico ou segmentacao"
      - "Ajustar lance ou estrategia de lances"
    justificativa: "1 dia nao tem dados suficientes para decisao estatistica"

  semanal_7d:
    periodo: "7 dias"
    uso: "Leitura principal — otimizacao semanal"
    acoes_permitidas:
      - "Pausar criativos com CTR abaixo de 0.5% sem excecao de CPL"
      - "Duplicar orcamento de criativos com CPL abaixo da meta"
      - "Ajustar publicos que nao entregam volume"
      - "Solicitar novos criativos para angulos sem resultado"
    nota: "Janela principal de trabalho do gestor de trafego"

  confirmacao_14d:
    periodo: "14 dias"
    uso: "Confirmar tendencias antes de decisoes grandes"
    acoes_permitidas:
      - "Parar campanha inteira por underperformance"
      - "Mudar objetivo da campanha"
      - "Revisao de estrategia com @strategist"
    nota: "Decisoes irreversiveis ou de alto impacto"

  tendencia_30d:
    periodo: "30 dias"
    uso: "Analise de padroes, sazonalidade e crescimento"
    acoes_permitidas:
      - "Revisao completa de estrategia"
      - "Analise de sazonalidade e ajuste de verba"
      - "Relatorio mensal ao cliente"
      - "Ativacao de modo growth"

regras_criticas:
  - "NUNCA pausar criativo com menos de 3 dias rodando (exceto emergencia)"
  - "NUNCA mudar tudo ao mesmo tempo — 1 variavel por teste"
  - "Periodo de aprendizado Meta Ads: 7-14 dias sem otimizacoes agressivas"
  - "Comparar criativos na mesma janela de tempo — comparacoes injustas sao invalidas"
  - "Feriados e datas especiais: excluir do calculo de media quando relevante"

sinais_de_alerta_imediato:
  - "CPL > 3x a meta por 2 dias seguidos"
  - "CTR < 0.3% em anuncio com mais de 2000 impressoes"
  - "Frequencia > 5 em publico pequeno (<50k)"
  - "Gasto diario > 150% do budget configurado"
  - "Zero conversoes com gasto > 2x custo esperado por conversao"
