# Taxonomia de publicos para campanhas pagas
# Referencia para @traffic ao mapear e configurar publicos

categorias:
  frio:
    descricao: "Pessoas que nunca tiveram contato com a marca"
    temperatura: 0
    custo_aquisicao: "alto"
    volume: "alto"
    tipos:
      interesse_amplo:
        descricao: "Segmentacao por interesses, comportamentos e demograficos"
        quando_usar: "Inicio das campanhas, escala de volume"
        meta_ads: "Interesses + comportamentos + restricao demografica"
        risco: "Baixa precisao — volume alto, qualidade media"

      lookalike_1pct:
        descricao: "1% mais semelhante a uma audiencia seed (clientes, leads)"
        quando_usar: "Principal publico de prospeccao apos ter seed de qualidade"
        seed_minima: "300-500 pessoas na audiencia base"
        meta_ads: "Publico Semelhante 1%"
        risco: "Depende da qualidade da seed"

      lookalike_1_3pct:
        descricao: "Lookalike expandido para maior volume"
        quando_usar: "Escala — quando 1% esgota volume"
        meta_ads: "Publico Semelhante 1-3%"

      google_intencao_personalizada:
        descricao: "Usuarios que pesquisaram termos especificos recentemente"
        quando_usar: "Google Ads — capturar demanda ativa"
        google_ads: "Segmentos de publico personalizados por intencao"

  morno:
    descricao: "Pessoas que tiveram algum contato mas nao converteram"
    temperatura: 1
    custo_aquisicao: "medio"
    volume: "medio"
    tipos:
      engajamento_instagram_30d:
        descricao: "Quem interagiu com o perfil do Instagram nos ultimos 30 dias"
        meta_ads: "Engajamento com perfil Instagram > 30 dias"
        quando_usar: "Retargeting nivel 1"

      engajamento_instagram_7d:
        descricao: "Engajamento recente — mais intencional"
        meta_ads: "Engajamento com perfil Instagram > 7 dias"
        quando_usar: "Retargeting de alta intencao"

      visualizou_video_50pct:
        descricao: "Assistiu pelo menos 50% do video de campanha"
        meta_ads: "Visualizacao de video 50%+"
        quando_usar: "Retargeting para quem demonstrou interesse no conteudo"

      visitante_site_30d:
        descricao: "Visitou o site nos ultimos 30 dias (requer pixel)"
        quando_usar: "Retargeting geral de site"

  quente:
    descricao: "Pessoas com alta intencao ou que ja converteram"
    temperatura: 2
    custo_aquisicao: "baixo"
    volume: "baixo"
    tipos:
      visitante_site_7d:
        descricao: "Visitou o site nos ultimos 7 dias"
        meta_ads: "Website Custom Audience 7 dias"
        quando_usar: "Retargeting de alta intencao"

      iniciou_checkout:
        descricao: "Iniciou processo de compra ou lead mas nao concluiu"
        meta_ads: "Evento InitiateCheckout ou Lead parcial"
        quando_usar: "Recuperacao de abandono"

      lista_leads:
        descricao: "Base propria de leads ainda nao convertidos em clientes"
        meta_ads: "Customer List upload"
        quando_usar: "Nutricao e conversao de leads existentes"

      lista_clientes:
        descricao: "Base de clientes ativos (para upsell ou exclusao)"
        meta_ads: "Customer List upload"
        quando_usar: "Exclusao de publico ja convertido OU upsell"

exclusoes_obrigatorias:
  - "Excluir clientes atuais de campanhas de aquisicao (evita desperdicio)"
  - "Excluir publicos ja convertidos quando objetivo for novo cliente"
  - "Excluir publicos com frequencia alta (> 5) de campanhas de prospeccao"

regras_de_combinacao:
  - "Campanha de aquisicao: publico frio + excluir quentes"
  - "Campanha de retargeting: publicos mornos + quentes"
  - "Nao misturar frio e quente no mesmo conjunto de anuncios"
  - "Testar 1 publico por conjunto para medir performance individualmente"
