# Workflow: Google Ads — Setup e Gestao
# Versao: 1.0
# Agente responsavel: traffic

nome: "google-ads"
descricao: "Fluxo completo de setup, lancamento e gestao de campanhas Google Ads"
gatilho: "Cliente com objetivo de Search ou Performance Max aprovado na estrategia"

sequencia:
  - etapa: "ler-cliente"
    agente: "traffic"
    entrada: "briefing-final.md + plano-estrategico.md"
    saida: "contexto do cliente compreendido"
    dependencia: nenhuma
    nota: "Obrigatorio antes de qualquer acao na conta"

  - etapa: "auditar-conta-google"
    agente: "traffic"
    entrada: "acesso a conta Google Ads via Composio"
    saida: "clientes/{nome}/auditoria/auditoria-google-{data}.md"
    dependencia: "ler-cliente"

  - etapa: "mapear-keywords"
    agente: "traffic"
    entrada: "briefing-final.md, produto/servico do cliente"
    saida: "lista de palavras-chave por grupo e match type"
    dependencia: "auditar-conta-google"
    nota: "Via Context7: consultar melhores praticas de pesquisa de keywords se necessario"

  - etapa: "criar-copy-search"
    agente: "copywriter"
    entrada: "keywords mapeadas + plano-estrategico.md"
    saida: "headlines e descriptions para RSA (15 + 4 minimo)"
    dependencia: "mapear-keywords"
    nota: "Copy search tem regras especificas: 30 chars headlines, 90 chars descriptions"

  - etapa: "estruturar-campanhas"
    agente: "traffic"
    entrada: "keywords + copy aprovada"
    saida: "estrutura de campanhas e grupos definida (Search + PMax se aplicavel)"
    dependencia: "criar-copy-search"

  - etapa: "preparar-assets-pmax"
    agente: "designer"
    entrada: "briefing de assets: headlines, descriptions, imagens, video"
    saida: "assets visuais prontos para Performance Max"
    dependencia: "estruturar-campanhas"
    condicional: "apenas se campanha PMax estiver no plano"

  - etapa: "validar-qa"
    agente: "qa"
    entrada: "copy + assets + estrutura de campanhas"
    saida: "veredicto: APROVADO / REVISAO / BLOQUEADO"
    dependencia:
      - "criar-copy-search"
      - "preparar-assets-pmax"
      - "estruturar-campanhas"

  - etapa: "publicar-campanhas"
    agente: "traffic"
    entrada: "veredicto APROVADO + estrutura pronta + assets"
    saida: "campanhas ativas no Google Ads (via Composio)"
    dependencia: "validar-qa"
    nota: "Somente com APROVADO. Verificar rastreamento de conversao antes de publicar."

  - etapa: "monitorar-performance"
    agente: "traffic"
    entrada: "campanhas ativas"
    saida: "metricas coletadas (CTR, CPC, Quality Score, conversoes)"
    dependencia: "publicar-campanhas"
    nota: "Periodo de aprendizado: 7-14 dias sem otimizacoes agressivas"

  - etapa: "otimizar-search"
    agente: "traffic"
    entrada: "dados de 7+ dias, termos de pesquisa, Quality Score"
    saida: "palavras negativas adicionadas, bids ajustados, assets otimizados"
    dependencia: "monitorar-performance"

  - etapa: "gerar-relatorio"
    agente: "traffic"
    entrada: "metricas do periodo (via Composio Google Analytics)"
    saida: "clientes/{nome}/relatorios/relatorio-google-{data}.md"
    dependencia: "otimizar-search"

  - etapa: "enviar-relatorio"
    agente: "cs"
    entrada: "relatorio gerado pelo traffic"
    saida: "relatorio enviado ao cliente (via Composio)"
    dependencia: "gerar-relatorio"
