# Gatilhos mentais para uso em copy
# Versao: 1.0
# Usado por: copywriter, estrategista

urgencia:
  descricao: "Prazo ou condicao que expira, forca decisao imediata"
  quando_usar: "Ofertas limitadas no tempo, vagas com deadline"
  exemplos:
    - "Oferta valida ate sexta-feira"
    - "Ultimas 72 horas com condicao especial"
    - "Apenas esta semana"

escassez:
  descricao: "Quantidade limitada, medo de perder a oportunidade"
  quando_usar: "Vagas limitadas, lote exclusivo"
  exemplos:
    - "Apenas 3 vagas restantes"
    - "So para os 50 primeiros"
    - "Lote 1 — quando acabar, acabou"

prova_social:
  descricao: "O que outras pessoas fizeram ou disseram valida a escolha"
  quando_usar: "ICP em duvida, produto novo, mercado competitivo"
  exemplos:
    - "+500 clientes atendidos"
    - "4.9 estrelas no Google"
    - "Junte-se a mais de 10.000 profissionais"

autoridade:
  descricao: "Credenciais, experiencia ou reconhecimento que geram confianca"
  quando_usar: "ICP precisa de seguranca antes de comprar"
  exemplos:
    - "10 anos de experiencia no mercado"
    - "Certificacao internacional"
    - "Referencia no setor desde 2015"

reciprocidade:
  descricao: "Dar algo de valor primeiro cria obrigacao moral de retribuir"
  quando_usar: "Captura de leads, relacionamento inicial"
  exemplos:
    - "Baixe gratis nosso guia completo"
    - "Aula gratuita: os 3 erros que mais custam"

compromisso_coerencia:
  descricao: "Pessoa tende a agir de forma coerente com declaracoes previas"
  quando_usar: "Sequencia de engajamento, qualificacao de lead"
  exemplos:
    - "Voce concorda que {problema} esta travando seu crescimento?"
    - "Se voce quer {resultado}, o proximo passo e {acao}"

novidade:
  descricao: "Cerebro humano e atraido pelo novo e diferente"
  quando_usar: "Lancamento, mecanismo unico, diferenca competitiva"
  exemplos:
    - "Metodo que nenhum concorrente usa"
    - "Nova abordagem para um problema antigo"
    - "Voce nunca viu nada parecido"

pertencimento:
  descricao: "Desejo de fazer parte de um grupo exclusivo"
  quando_usar: "Comunidades, programas premium, segmentos nichados"
  exemplos:
    - "Faca parte do grupo seleto de"
    - "Para empresarios que levam serio"
    - "Comunidade exclusiva para"

antecipacao:
  descricao: "Criar expectativa por algo que esta por vir"
  quando_usar: "Lancamentos, countdown, teaser"
  exemplos:
    - "Algo grande esta chegando"
    - "Faltam 3 dias"
    - "Voce nao esta preparado para isso"

aversao_perda:
  descricao: "Medo de perder e mais forte que desejo de ganhar"
  quando_usar: "Remarketing, reativacao, urgencia"
  exemplos:
    - "Voce esta deixando dinheiro na mesa"
    - "Para cada dia sem acao, perde R$"
    - "Seu concorrente ja esta fazendo"
