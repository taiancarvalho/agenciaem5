# em5 — Preço por Nicho (referência interna)
# Range pra @vendas Caça embasar proposta.
# Atualizar mensalmente conforme learnings/vendas-ganhos.md.

versao: "1.0"
data_atualizacao: "2026-05-16"
moeda: BRL

# Modelo padrão: fee mensal + verba de mídia separada
# Fee mensal inclui: estratégia, copy, design, tráfego, QA, CS, relatórios

niches:
  clinica_odonto:
    fee_mensal_min: 3500
    fee_mensal_max: 7000
    setup_unico: 1500
    verba_midia_min: 2000
    ticket_medio_cliente: 1200  # do cliente da clínica (cobertura)
    cac_target: 80
    margem_minima_pra_aceitar: 40  # % sobre fee

  clinica_estetica:
    fee_mensal_min: 4000
    fee_mensal_max: 8500
    setup_unico: 2000
    verba_midia_min: 3000
    ticket_medio_cliente: 800
    cac_target: 60

  saas_b2b:
    fee_mensal_min: 5000
    fee_mensal_max: 15000
    setup_unico: 3000
    verba_midia_min: 5000
    ciclo_vendas_dias: 60
    cac_target: 800

  info_produto:
    fee_mensal_min: 3500
    fee_mensal_max: 9000
    setup_unico: 2500
    verba_midia_min: 5000
    formato: campanha_lancamento  # 6-8 sem por lançamento

  ecommerce:
    fee_mensal_min: 4500
    fee_mensal_max: 12000
    setup_unico: 2500
    verba_midia_min: 3000
    metric_principal: ROAS
    roas_target: 4

  servicos_locais:  # advogado, contador, dentista geral
    fee_mensal_min: 2500
    fee_mensal_max: 5500
    setup_unico: 1000
    verba_midia_min: 1500

# Modificadores
modificadores:
  cliente_internacional: 1.4  # +40%
  multi_unidade: 1.3  # 2-5 unidades = +30%
  exclusividade_nicho_cidade: 1.5  # +50%
  contrato_anual: 0.85  # -15% se 12 meses fechado
  pagamento_anual_avista: 0.80  # -20%

# Quando recusar
nao_aceitar_abaixo_de:
  fee_mensal: 2500
  razao: "Cobre custo operacional mínimo do agente solo. Abaixo = trabalha de graça."

flag_revisao:
  - "Cliente pede ≥ 3 nichos diferentes" → escala @ceo
  - "Verba de mídia abaixo do mínimo" → recomenda começar com setup + reduzir escopo
  - "Cliente quer comissão sobre venda em vez de fee" → reject (Art. VI risco)
