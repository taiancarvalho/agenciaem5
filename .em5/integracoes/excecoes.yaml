# em5 — Exceções ao Art. IX (Composio Gateway Default)
# Toda exceção precisa satisfazer 5 critérios. Veja .em5/core/constitution.md Art. IX (v1.3).
# Mudanças aqui exigem aprovação do @ceo Atlas.

versao: "1.0"
data_atualizacao: "2026-05-16"

excecoes_art_ix:
  - mcp_id: asaas
    nome: "Asaas — Financeiro BR"
    url_mcp: "https://docs.asaas.com/mcp"
    docs: "https://docs.asaas.com/docs/mcp-1"
    provider: "Asaas (oficial, mantido pelo provider)"
    razao: |
      Asaas é gateway financeiro brasileiro (PIX, boleto, cartão).
      Não está disponível no Composio.
      MCP é mantido pela própria Asaas — fonte primária, sem 3rd-party.
      Único caminho viável pra @fin Caixa operar financeiro BR com automação.
    capacidades:
      - listar_cobrancas
      - criar_cobranca
      - registrar_pagamento
      - consultar_clientes
      - gerenciar_assinaturas
      - receber_webhooks
    agente_consumidor: "@fin Caixa"
    auditoria_log: ".em5/learnings/{mes}/mcp-excecoes.md"
    aprovado_em: "2026-05-16"
    aprovado_por: ceo
    auth:
      tipo: "access_token"
      env_var: "ASAAS_TOKEN"
      sandbox_disponivel: true
    risco:
      nivel: baixo
      mitigacao: |
        - MCP oficial reduz risco de breakage
        - Webhooks complementam polling (eventos em tempo real)
        - Sandbox usado pra testes antes de prod
    revisao_proxima: "2026-08-16"  # 3 meses

# Templates pra futuras exceções (referência)
template_nova_excecao:
  mcp_id: "{slug}"
  nome: "{Nome do Provider} — {Domínio}"
  url_mcp: "{URL oficial do MCP server}"
  docs: "{URL docs oficiais}"
  provider: "{Nome — oficial ou 3rd-party? Se 3rd-party, NÃO aceitar}"
  razao: |
    {Por que Composio não cobre + por que MCP oficial é necessário}
  capacidades:
    - "{lista de operações}"
  agente_consumidor: "@{agente-que-vai-usar}"
  auditoria_log: ".em5/learnings/{mes}/mcp-excecoes.md"
  aprovado_em: "{YYYY-MM-DD}"
  aprovado_por: ceo
  auth:
    tipo: "{access_token | oauth | api_key}"
    env_var: "{NOME_DA_ENV_VAR}"
  risco:
    nivel: "{baixo | medio | alto}"
    mitigacao: "{como mitigar}"
  revisao_proxima: "{YYYY-MM-DD — máximo 3 meses}"
