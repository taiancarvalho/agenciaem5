# em5 — WhatsApp Stop Rules
# Regras absolutas de quando @whats Onda PARA de enviar.

absolutas:
  - id: cliente_pediu_parar
    descricao: "Cliente enviou frase de stop"
    triggers:
      - "para de me mandar"
      - "não quero mais"
      - "remove meu numero"
      - "stop"
      - "sair da lista"
    acao: adicionar_cliente_lista_stop
    permanente: true

  - id: horario_silencioso
    descricao: "Janela 22:00-08:00 horário do cliente"
    excecao: severity = critico
    acao: agendar_para_08h00

  - id: max_mensagens_dia
    descricao: "Máximo 3 mensagens automáticas por cliente por dia"
    valor: 3
    excecao: cliente_iniciou_conversa
    acao: descartar + log

  - id: resposta_negativa_3x
    descricao: "Cliente respondeu negativo 3x seguidas"
    deteccao: sentiment_analysis
    acao: handoff_humano + congelar_automacao_72h

  - id: feriado_local
    descricao: "Feriado nacional ou local do cliente"
    excecao: severity = critico
    acao: agendar_proximo_dia_util

handoff_humano:
  destino_padrao: '@cs Sol'
  notificar_via:
    - whatsapp_para_owner_agencia
    - email_para_owner_agencia
    - log em .em5/learnings/{mes}/whats-handoffs.md

audit:
  - toda mensagem enviada loga em clientes/{slug}/comunicacao/whats-log.md
  - toda stop loga em .em5/learnings/{mes}/whats-stops.md
  - toda handoff loga em .em5/learnings/{mes}/whats-handoffs.md
