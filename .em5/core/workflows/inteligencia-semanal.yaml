# Workflow: Inteligência Competitiva Semanal
# Versao: 1.0 (Sprint 8 — scout)
nome: "inteligencia-semanal"
descricao: "Scrape concorrência + SWOT delta + alerta movimentação relevante"
versao: "1.0"
gatilho: "Cron semanal (segunda 10h)"
agente_orquestrador: "coo"
agente_responsavel_entrega: "scout"
qa_gate: false

inputs:
  - "lista concorrentes diretos (clientes/{nome}/inteligencia/concorrentes.md)"

outputs:
  - "clientes/{nome}/inteligencia/semanal-{YYYY-SS}.md"
  - "alertas movimentação relevante → @strategist + @cs"

sequencia:
  - id: 1
    etapa: "scrape-concorrentes"
    agente: "scout"
    task: "scrape-site-concorrente.md"
    saida: "snapshot sites + redes sociais + ads ativos"
    composio_mcp: ["firecrawl", "brightdata", "apify", "scrapingbee"]

  - id: 2
    etapa: "monitorar-ads-meta-library"
    agente: "scout"
    task: "monitorar-ads-concorrente.md"
    saida: "lista ads novos + retirados + criativos top + mudança copy"
    composio_mcp: "meta_ads"

  - id: 3
    etapa: "comparar-vs-semana-anterior"
    agente: "scout"
    saida: "delta detectado (preço mudou? novo produto? campanha nova? sumiu do mercado?)"

  - id: 4
    etapa: "gerar-swot-delta"
    agente: "scout"
    task: "gerar-swot.md"
    saida: "semanal-{YYYY-SS}.md (SWOT atualizado + movimentações + recomendações)"

  - id: 5
    etapa: "disparar-alertas"
    agente: "scout"
    task: "alerta-movimentacao.md"
    condicao: "movimentação relevante (preço, lançamento, mudança posicionamento)"
    saida: "alerta WhatsApp/Slack @strategist + @cs"

  - id: 6
    etapa: "compartilhar-cliente-se-relevante"
    agente: "cs"
    condicao: "insight acionável pelo cliente"
    saida: "compartilha via weekly-digest OR call dedicada"

metricas:
  cadencia: "segunda 10h semanal"
  alertas_acionaveis: ">= 1/semana (sinal sistema funciona)"
  insights_aplicados_cliente: "tracked trimestralmente"
