# Workflow: Pixel Quebrado (Crisis)
# Versao: 1.0 (Sprint 7 — crisis)
nome: "pixel-quebrado"
descricao: "Detecção + diagnose + correção rápida quando conversões caem 80%+ overnight"
versao: "1.0"
gatilho: "Daily-run detecta queda 80%+ conversões 24h OR alerta manual"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: false
sla: "<= 4h pra restaurar tracking"

inputs:
  - "snapshot daily-run com queda detectada"

outputs:
  - "clientes/{nome}/crisis/pixel-quebrado-{YYYY-MM-DD}/diagnostico.md"
  - "clientes/{nome}/crisis/pixel-quebrado-{YYYY-MM-DD}/correcao.md"

sequencia:
  - id: 1
    etapa: "confirmar-queda"
    agente: "traffic"
    saida: "diagnostico.md (queda real OR sazonal OR algoritmo)"
    metodo: "comparar Meta + GA4 + backend cliente (3 fontes)"

  - id: 2
    etapa: "testar-pixel-vivo"
    agente: "cs"
    saida: "Meta Pixel Helper (extension) + Test Events Meta + DebugView GA4"
    diagnostico_comum:
      pixel_removido: "deploy site removeu tag"
      gtm_unpublished: "alguém despublicou container"
      bloqueio_consent: "GDPR/LGPD banner bloqueando"
      cookie_expired: "domínio mudou OR cookie reset"
      capi_down: "servidor CAPI offline"

  - id: 3
    etapa: "corrigir-imediato"
    agente: "cs"
    saida: "correcao.md + tag re-instalada/publicada"

  - id: 4
    etapa: "validar-eventos"
    agente: "traffic"
    saida: "Test Events disparando + match rate normalizou"

  - id: 5
    etapa: "comunicar-cliente"
    agente: "cs"
    saida: "post-mortem cliente (transparente — agência pegou rápido)"

metricas:
  tempo_deteccao: "<= 24h (via daily-run)"
  tempo_correcao: "<= 4h pós-detecção"
  recuperacao_conversoes: "100% em 48h"
