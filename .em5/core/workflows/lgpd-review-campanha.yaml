# Workflow: LGPD Review de Campanha
# Versao: 1.0 (Sprint 8 — legal)
nome: "lgpd-review-campanha"
descricao: "Validação LGPD antes de subir formulário/captura/cookies — proteção legal agência + cliente"
versao: "1.0"
gatilho: "Toda campanha com captura de dados antes de publicar"
agente_orquestrador: "coo"
agente_responsavel_entrega: "qa"
qa_gate: true
bloqueante: true  # não publica sem APROVADO

inputs:
  - "campanha pronta + LP + formulário"
  - "política de privacidade cliente"

outputs:
  - "clientes/{nome}/legal/lgpd-review-{YYYY-MM-DD}-{campanha}.md"

sequencia:
  - id: 1
    etapa: "checar-consent"
    agente: "cs"
    saida: "verificação consent banner cookies + opt-in explícito formulário"
    requisitos:
      - "Banner cookies (não pre-marcado)"
      - "Opt-in checkbox formulário (não pre-marcado)"
      - "Texto consent claro (não jurídico vazio)"
      - "Granularidade (marketing vs analytics separados)"

  - id: 2
    etapa: "checar-politica-privacidade"
    agente: "cs"
    saida: "política existe + linkada no rodapé LP + cobre uso dados captados"
    requisitos:
      - "Finalidade declarada"
      - "Base legal LGPD especificada"
      - "Direitos titular (acesso/correção/exclusão)"
      - "DPO contato"
      - "Tempo retenção"

  - id: 3
    etapa: "checar-dados-coletados"
    agente: "cs"
    saida: "minimização dados (só o necessário)"
    proibido:
      - "Coletar CPF sem necessidade"
      - "Pedir dados de menores sem responsável"
      - "Dados sensíveis (saúde, étnico, religioso) sem consent específico"

  - id: 4
    etapa: "veredicto-lgpd"
    agente: "qa"
    saida: "veredicto APROVADO | REVISAO | BLOQUEADO"
    bloqueio_se:
      - "Sem opt-in"
      - "Sem política privacidade linkada"
      - "Dados sensíveis sem proteção"
      - "Cookies disparando antes de consent"

  - id: 5
    etapa: "arquivar-evidencia"
    agente: "cs"
    saida: "lgpd-review-{YYYY-MM-DD}-{campanha}.md (evidência compliance)"

on_failure:
  bloqueado: "campanha NÃO sobe. @coo retorna ao time responsável corrigir"
  duvida_juridica: "@ceo decide consultar advogado externo"

metricas:
  taxa_aprovacao_primeira: ">= 90%"
  bloqueios_por_mes: "tracked (sinal qualidade processo)"
