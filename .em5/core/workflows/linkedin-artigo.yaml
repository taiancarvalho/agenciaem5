nome: "linkedin-artigo"
descricao: "Artigo longo LinkedIn (1500+ palavras) — autoridade B2B mensal"
versao: "1.0"
gatilho: "Calendario mensal OR pedido estrategia thought-leadership"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: true

sequencia:
  - {id: 1, etapa: "tema-autoridade", agente: "strategist", saida: "tema profundo + tese ousada"}
  - {id: 2, etapa: "outline", agente: "copywriter", saida: "outline (H1 + 5-7 H2 + bullets)"}
  - {id: 3, etapa: "escrever-artigo", agente: "copywriter", task: "escrever-copy.md", saida: "1500-3000 palavras + imagens placeholder"}
  - {id: 4, etapa: "design-capa", agente: "designer", saida: "capa 1920x1080 + 2-3 graficos inline"}
  - {id: 5, etapa: "qa", agente: "qa", checklist: ["tese clara", "fontes citadas", "sem auto-promocao", "tom autoridade"]}
  - {id: 6, etapa: "publicar", agente: "cs", saida: "publicado + divulgacao redes proprias 24h"}
metricas: {prazo: "<= 7d", alvo_reach: ">= 5x seguidores", alvo_comments: ">= 20"}
