# Workflow: Ciclo de Campanha
# Versao: 2.1 (Sprint 1 — add gate @fin.verificar-budget antes do publish + orquestrador @coo formal)
# Agentes: coo (orquestra) → strategist → [traffic+copy+designer ‖] → qa → fin (budget) → traffic (publish) → cs

nome: "ciclo-campanha"
descricao: "Fluxo completo de criacao, producao e publicacao de campanha"
versao: "2.1"
gatilho: "Board do cliente completo (board-cliente.md gerado pelo @cs) OU skill /campanha"
agente_orquestrador: "coo"  # CLAUDE.md Regra 1 — main thread não orquestra
agente_responsavel_entrega: "cs"
qa_gate: true

# ----------------------------------------------------------------
# WAVES: grupos de tasks com sincronizacao explicita
# sync: all-must-complete = todos precisam terminar antes da proxima wave
# sync: sequential = tasks rodam em sequencia dentro da wave
# ----------------------------------------------------------------

waves:

  wave-1-estrategia:
    descricao: "Analise e plano estrategico"
    sync: all-must-complete
    artefato-saida: "estrategia/plano-estrategico.md"
    tasks:
      - etapa: "analisar-briefing"
        agente: "strategist"
        entrada: "onboarding/board-cliente.md"
        saida: "estrategia/analise-briefing.md"

      - etapa: "criar-plano-estrategico"
        agente: "strategist"
        entrada: "estrategia/analise-briefing.md"
        saida: "estrategia/plano-estrategico.md"
        dependencia: "analisar-briefing"

  wave-2-paralelo:
    descricao: "Auditoria + ICP + branding em paralelo (iniciam ao mesmo tempo)"
    sync: all-must-complete
    checkpoint: "qa-wave-2"
    tasks:
      - etapa: "auditar-mapear"
        agente: "traffic"
        entrada: "estrategia/plano-estrategico.md"
        saida: "trafego/auditoria.md + trafego/publicos-mapeados.md"
        ferramenta: "Composio MCP (Meta Ads / Google Ads)"

      - etapa: "analisar-icp"
        agente: "copywriter"
        entrada: "onboarding/board-cliente.md, estrategia/plano-estrategico.md"
        saida: "copy/analise-icp.md"

      - etapa: "ler-branding"
        agente: "designer"
        entrada: "branding/cores.yaml, branding/fontes.yaml, branding/guia-estilo.md"
        saida: "diretrizes visuais compreendidas"

  checkpoint-wave-2:
    descricao: "QA valida os outputs da wave 2 antes de prosseguir"
    agente: "qa"
    entrada:
      - "trafego/auditoria.md"
      - "copy/analise-icp.md"
    veredicto: "APROVADO / BLOQUEADO"
    on-blocked:
      action: gerar-diagnosis
      path: "operacao/diagnosis-wave-2.md"
      notify: coo
      auto-retry: 2

  wave-3-producao:
    descricao: "Estrutura de campanha + copy + conceito visual"
    sync: all-must-complete
    condicao: "checkpoint-wave-2 = APROVADO"
    tasks:
      - etapa: "estruturar-campanha"
        agente: "traffic"
        entrada: "trafego/publicos-mapeados.md, estrategia/plano-estrategico.md"
        saida: "trafego/campanhas-ativas.md"
        ferramenta: "Composio MCP (Meta Ads)"

      - etapa: "criar-angulos-e-copy"
        agente: "copywriter"
        entrada: "copy/analise-icp.md, estrategia/plano-estrategico.md"
        saida: "copy/angulos.md + copy/CR-XXX.md por canal"

      - etapa: "definir-conceito-visual"
        agente: "designer"
        entrada: "copy/CR-XXX.md (apos copywriter terminar)"
        saida: "conceito visual definido"
        dependencia: "criar-angulos-e-copy"

      - etapa: "produzir-criativos"
        agente: "designer"
        entrada: "conceito visual, copy associada, branding"
        saida: "design/criativos/CR-XXX-v1.{ext}"
        dependencia: "definir-conceito-visual"

  wave-4-publicacao:
    descricao: "Validacao final e publicacao"
    sync: sequential
    tasks:
      - etapa: "validar-tudo"
        agente: "qa"
        entrada: "copy/CR-XXX.md + design/criativos/ + trafego/campanhas-ativas.md"
        saida: "veredicto: APROVADO / REVISAO / BLOQUEADO"
        dependencia:
          - "criar-angulos-e-copy"
          - "produzir-criativos"
          - "estruturar-campanha"

      - etapa: "verificar-budget"
        agente: "fin"
        task: "calcular-roi-cliente.md"
        entrada:
          - "trafego/campanhas-ativas.md (budget proposto por campanha)"
          - "clientes/{nome}/financeiro/ (status pagamentos + saldo disponivel)"
          - "em5-config.yaml (limite_budget_sem_aprovacao)"
        saida: "clientes/{nome}/financeiro/aprovacao-budget-{YYYY-MM-DD}.md"
        veredictos: ["APROVADO", "PENDENTE_PAGAMENTO_CLIENTE", "INSUFICIENTE", "EXCEDE_LIMITE"]
        dependencia: "validar-tudo"
        on-failure:
          PENDENTE_PAGAMENTO_CLIENTE: "@coo congela publish + @cs comunica cliente + @whats lembrete pagamento"
          INSUFICIENTE: "@coo congela publish + @ceo decide (cobranca extra ou reduzir escopo)"
          EXCEDE_LIMITE: "@coo escala @ceo aprovacao manual"
        importante: "Sem este gate, agencia publicou campanha de cliente inadimplente em 2025 (incident em5 v1.2)"

      - etapa: "publicar-campanha"
        agente: "traffic"
        entrada: "veredicto APROVADO @qa + APROVADO @fin, criativos finais, estrutura pronta"
        saida: "campanha ativa na plataforma"
        dependencia: "verificar-budget"
        condicao: "verificar-budget.veredicto == APROVADO"
        ferramenta: "Composio MCP (Meta Ads / Google Ads)"

  wave-5-acompanhamento:
    descricao: "Monitoramento e relatorio"
    sync: sequential
    tasks:
      - etapa: "monitorar-performance"
        agente: "traffic"
        entrada: "campanha ativa, KPIs do plano-estrategico.md"
        saida: "metricas coletadas e avaliadas"
        dependencia: "publicar-campanha"
        ferramenta: "Composio MCP (Google Analytics / Meta Ads)"

      - etapa: "gerar-relatorio"
        agente: "traffic"
        entrada: "metricas da campanha"
        saida: "relatorios/relatorio-periodo.md"
        dependencia: "monitorar-performance"

      - etapa: "enviar-relatorio"
        agente: "cs"
        entrada: "relatorios/relatorio-periodo.md"
        saida: "relatorio enviado ao cliente"
        dependencia: "gerar-relatorio"
        ferramenta: "Composio MCP (Gmail / Slack)"

# ----------------------------------------------------------------
# ON-FAILURE: comportamento padrao em qualquer falha de wave
# ----------------------------------------------------------------

on-failure:
  action: gerar-diagnosis
  formato:
    path: "operacao/diagnosis-{etapa}-{YYYY-MM-DD}.md"
    campos:
      - "Problema identificado"
      - "Causa-raiz provavel"
      - "Agente responsavel pela correcao"
      - "Acao corretiva"
      - "Prioridade: CRITICO / NORMAL / BAIXO"
      - "Retestar apos"
  notify: coo
  auto-retry: 2
  escalar-para-ceo-se: retries-esgotados

# ----------------------------------------------------------------
# MEMORIA: todos os agentes devem registrar ao terminar cada etapa
# ----------------------------------------------------------------

memoria:
  arquivo: "memoria/notas-sessao.md"
  instrucao: >
    Todo agente DEVE adicionar uma entrada em notas-sessao.md ao terminar
    cada etapa. Incluir: o que foi feito, decisoes importantes,
    e o que a proxima sessao precisa saber.
