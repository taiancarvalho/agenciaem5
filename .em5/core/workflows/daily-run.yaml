# Workflow: Daily Run — Snapshot Diário Multi-cliente
# Versao: 1.0 (Sprint 2 — Skills↔YAML)
# Agentes: coo → traffic (×N clientes paralelo) → cs (consolida alertas)

nome: "daily-run"
descricao: "Snapshot diario de saude operacional de TODAS as contas ativas — protetivo, nao otimiza"
versao: "1.0"
gatilho: "Skill `/dia` OU cron diario 8h-9h (segunda-sabado, exceto feriado)"
agente_orquestrador: "coo"  # CLAUDE.md Regra 1
agente_responsavel_entrega: "cs"
qa_gate: false  # snapshot operacional, nao artefato cliente-facing
duracao_alvo: "10-15 min total (paralelo)"

inputs:
  - "lista clientes ativos (em5-config.yaml.clientes_ativos OU scan clientes/*/operacao/proximos-passos.md)"

outputs:
  - "clientes/{nome}/operacao/daily-{YYYY-MM-DD}.md (1 por cliente)"
  - "operacao/painel-dia-{YYYY-MM-DD}.md (consolidado agencia)"
  - "alertas WhatsApp/Slack pra ALERTA (CPL 2x+)"

sequencia:

  # ===== FASE 1: DESCOBERTA =====
  - id: 1
    etapa: "listar-clientes-ativos"
    agente: "coo"
    task: "delegar-operacao.md"
    entrada: "em5-config.yaml + scan clientes/*/"
    saida: "lista N clientes ativos com status, ad_account_id, plano contratado"
    dependencia: nenhuma
    criterio_ativo: "clientes/{nome}/operacao/proximos-passos.md ultima modificacao < 30d AND fin.status != INADIMPLENTE_30d+"

  # ===== FASE 2: COLETA PARALELA =====
  - id: 2
    etapa: "snapshot-cliente-paralelo"
    agente: "coo"
    task: "delegar-operacao.md"
    descricao: "Dispatch paralelo de @traffic.monitorar-performance pra cada cliente (max 5 em paralelo pra evitar rate limit Composio)"
    entrada: "lista clientes ativos"
    saida: "N tasks em background (TaskCreate run_in_background=true)"
    dependencia: "listar-clientes-ativos"
    paralelismo: "max 5 simultaneos (Meta Ads rate limit safety)"

  - id: 3
    etapa: "monitorar-por-cliente"
    agente: "traffic"
    task: "monitorar-performance.md"
    entrada:
      - "ad_account_id"
      - "plano-estrategico.md (KPIs alvo)"
      - "log-performance-criativa.md (baseline)"
    saida: "clientes/{nome}/operacao/daily-{YYYY-MM-DD}.md"
    composio_mcp: "meta_ads + google_ads"
    dependencia: "snapshot-cliente-paralelo"
    classificacao:
      NORMAL: "CPL/CPA dentro de 1.2x meta, freq < 2.5, delivery OK — log curto"
      ATENCAO: "CPL 1.5x meta OR freq 2.5-3.5 OR delivery <80% — observar 24h"
      ALERTA: "CPL 2x+ meta OR freq >4.0 OR 0 conv 24h+ — pausa imediata + escalar"
    acoes_permitidas:
      NORMAL: "apenas log"
      ATENCAO: "log + flag em notas-sessao"
      ALERTA: "PAUSA campanha problematica + log + escalar @coo + alerta WhatsApp/Slack"

  # ===== FASE 3: CONSOLIDAÇÃO =====
  - id: 4
    etapa: "consolidar-painel"
    agente: "coo"
    task: "consolidar-e-reportar.md"
    entrada: "N x daily-{YYYY-MM-DD}.md"
    saida: "operacao/painel-dia-{YYYY-MM-DD}.md"
    dependencia: "monitorar-por-cliente"
    estrutura_painel:
      - "Resumo (N clientes processados, X NORMAL, Y ATENCAO, Z ALERTA)"
      - "ALERTAs detalhados (cliente + campanha + acao tomada)"
      - "ATENCAOs (cliente + sinal + observacao)"
      - "NORMAIs (lista curta + tempo total)"
      - "Falhas de coleta (cliente + motivo)"

  - id: 5
    etapa: "alertar-operador"
    agente: "cs"
    task: "registrar-interacao.md"
    entrada: "painel-dia + lista ALERTAs"
    saida: "alertas enviados via WhatsApp (operador) + Slack (canal #ops)"
    composio_mcp: ["slack", "gmail"]
    dependencia: "consolidar-painel"
    condicao: "len(ALERTAs) > 0 OR len(falhas) > 0"
    canais:
      WhatsApp_operador: "sempre se ALERTA > 0"
      Slack_ops: "sempre (resumo + link painel)"
      email_ceo: "se ALERTA > 2 OR falhas > 3 (escala estrategica)"

# ===== ON FAILURE =====
on_failure:
  cliente_sem_dados: "log 'falha de coleta' + continua proximo cliente (nao bloqueia run)"
  composio_rate_limit: "@coo backoff 5min + retry restantes"
  >5_clientes_falha: "@coo escala @ceo (incident infra Composio?)"

# ===== METRICAS =====
metricas:
  duracao_alvo: "10-15 min total ate N=20 clientes"
  taxa_sucesso_coleta: "> 95%"
  tempo_deteccao_alerta: "< 12h (antes do dia seguinte)"
  alertas_falsos_alvo: "< 10% (nao gritar lobo)"

# ===== NOTAS =====
notas_importantes:
  - "Daily run é PROTETIVO, nao otimiza — apenas pausa em ALERTA"
  - "Otimizacao formal exige `/iterar` separado (workflow iteracao-criativa.yaml + janela 7d minima)"
  - "Cron desabilitado em feriado nacional + fim-de-semana (configurar via /schedule no Sprint Final)"
  - "Operador pode rodar manual a qualquer momento via `/dia`"
  - "Falhas individuais nao bloqueiam run — degradacao graciosa"
