nome: "time-tracking"
descricao: "Tracking horas por cliente -> input ROI hora + capacidade equipe"
versao: "1.0"
gatilho: "Cron diario (fim de dia)"
agente_orquestrador: "coo"
agente_responsavel_entrega: "fin"
qa_gate: false

sequencia:
  - {id: 1, etapa: "coletar-horas", agente: "coo", saida: "horas por agente/cliente do dia"}
  - {id: 2, etapa: "calcular-roi-hora", agente: "fin", saida: "valor cliente / horas gastas (ROI)"}
  - {id: 3, etapa: "alertar-overrun", agente: "coo", condicao: "cliente > 150% horas previstas no contrato", saida: "alerta @ceo (renegociar OU ajustar escopo)"}
metricas: {cadencia: "diaria", roi_hora_alvo: "definir por agencia em em5-config.yaml"}
composio_mcp: ["clockify", "harvest", "toggl", "timecamp"]
