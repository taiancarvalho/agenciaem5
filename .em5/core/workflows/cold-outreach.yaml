# Workflow: Cold Outreach (SDR)
# Versao: 1.0 (Sprint 3 — ativar @vendas)
# Agentes: coo → vendas (lista + cadencia + resposta) → trigger prospec-fechamento se resposta positiva

nome: "cold-outreach"
descricao: "Prospeccao ativa SDR — lista ICP + cadencia multicanal + resposta + qualificacao"
versao: "1.0"
gatilho: "Cron semanal (segunda 8h — semana de prospec) OU skill `/cold-outreach {nicho}`"
agente_orquestrador: "coo"  # CLAUDE.md Regra 1
agente_responsavel_entrega: "vendas"
qa_gate: false  # cadencia automatizada com guard-rails

inputs:
  - "nicho alvo OR perfil ICP refinado (clientes/_agencia/icp.md)"
  - "tamanho lista alvo (default 50/semana)"
  - "canais ativos (LinkedIn + email cold + WhatsApp Business cold se aplicavel)"

outputs:
  - "vendas/outreach/{YYYY-SS}-lista.csv (lista da semana)"
  - "vendas/outreach/{YYYY-SS}-cadencia.md (status por lead)"
  - "vendas/prospects/{slug}/ (criado quando lead responde positivo)"
  - "vendas/outreach/{YYYY-SS}-resultado.md (taxa resposta + qualificados)"

sequencia:

  # ===== ETAPA 1: PESQUISA LISTA =====
  - id: 1
    etapa: "definir-icp-semana"
    agente: "vendas"
    task: "pesquisar-prospect.md"
    entrada:
      - "clientes/_agencia/icp.md (perfil ideal)"
      - "vendas/outreach/historico-perdidos.md (aprendizados nutricao)"
    saida: "vendas/outreach/{YYYY-SS}-criterio.md (filtros: nicho + faturamento + regiao + porte + sinais)"
    dependencia: nenhuma

  - id: 2
    etapa: "gerar-lista-leads"
    agente: "vendas"
    task: "pesquisar-prospect.md"
    entrada: "criterio.md"
    saida: "vendas/outreach/{YYYY-SS}-lista.csv (50 leads — empresa + decisor + LinkedIn + email + telefone se publico + sinais)"
    dependencia: "definir-icp-semana"
    fontes:
      - "LinkedIn Sales Navigator (manual ou Apollo/Crustdata via Composio)"
      - "Meta Ad Library (quem ja roda ads no nicho)"
      - "Google Maps (negocios locais filtrados)"
      - "BuiltWith (stack tecnologica = sinal de maturidade digital)"
      - "BrightData/Apify scraping (lista publica de associacoes/eventos do nicho)"
    composio_mcp: ["apollo", "crustdata", "google_maps", "builtwith", "brightdata"]
    importante: "Respeitar LGPD — dados publicos OR opt-in explicito"

  # ===== ETAPA 2: PERSONALIZACAO =====
  - id: 3
    etapa: "personalizar-mensagens"
    agente: "vendas"
    task: "pesquisar-prospect.md"
    entrada: "lista.csv + template base mensagem (vendas/templates/cold-outreach-{canal}.md)"
    saida: "vendas/outreach/{YYYY-SS}-mensagens.csv (1 mensagem personalizada por lead, por canal)"
    dependencia: "gerar-lista-leads"
    template_pattern:
      - "Hook personalizado (1 linha sobre algo especifico do lead)"
      - "Valor (1 frase — porque agencia ajuda esse perfil)"
      - "CTA leve (call 15min OU pergunta aberta)"
    proibido:
      - "Spray-and-pray (mesma mensagem pra todos)"
      - "Falsas afirmacoes ('vi seu post...' sem ter visto)"
      - "Pressao/scarcity falsa"
      - "Frases motivacionais genericas"

  # ===== ETAPA 3: CADENCIA MULTICANAL =====
  - id: 4
    etapa: "disparar-cadencia-d0"
    agente: "vendas"
    task: "follow-up.md"
    entrada: "mensagens.csv"
    saida: "vendas/outreach/{YYYY-SS}-cadencia.md (status por lead)"
    dependencia: "personalizar-mensagens"
    canais_por_lead:
      D0: "LinkedIn connection request + nota personalizada"
      D2: "se aceitou conexao → mensagem LinkedIn DM"
      D5: "se sem resposta → email cold com hook diferente"
      D9: "se sem resposta → segundo email (case study + soft CTA)"
      D14: "se sem resposta → ultima cadencia (break-up email — 'devo fechar?')"
      D21: "marcar PERDIDO (move pra historico) OR NUTRIR-3M"
    composio_mcp: ["gmail", "linkedin (manual via browser)", "whatsapp_business (cuidado spam)"]
    rate_limit: "max 20 mensagens/dia/canal (anti-spam + anti-flag)"

  # ===== ETAPA 4: GESTAO RESPOSTAS =====
  - id: 5
    etapa: "monitorar-respostas"
    agente: "vendas"
    task: "registrar-interacao.md"
    entrada: "cadencia ativa"
    saida: "cadencia.md atualizado com tags (RESPOSTA_POSITIVA | RESPOSTA_NEGATIVA | OBJECAO | PEDIU_MAIS_INFO | DESCADASTRO)"
    dependencia: "disparar-cadencia-d0"
    frequencia: "cron diario 10h checar inbox (Gmail + LinkedIn)"

  - id: 6
    etapa: "qualificar-resposta-positiva"
    agente: "vendas"
    task: "pesquisar-prospect.md"
    entrada: "leads com RESPOSTA_POSITIVA"
    saida: "decisao por lead (AGENDAR_CALL | NUTRIR | DESCARTAR)"
    dependencia: "monitorar-respostas"
    criterios_call:
      - "Demonstrou interesse explicito em servico"
      - "Tem autoridade decisao OR pode levar a decisor"
      - "Sinal de urgencia/problema concreto"

  - id: 7
    etapa: "trigger-prospec-fechamento"
    agente: "coo"
    task: "delegar-operacao.md"
    entrada: "leads qualificados pra call"
    saida: "trigger workflow prospec-fechamento.yaml por lead"
    dependencia: "qualificar-resposta-positiva"
    condicao: "decisao == AGENDAR_CALL"
    handoff: "lead vira PROSPECT formal em vendas/prospects/{slug}/"

  # ===== ETAPA 5: ANALISE SEMANAL =====
  - id: 8
    etapa: "relatorio-semanal-outreach"
    agente: "vendas"
    task: "registrar-interacao.md"
    entrada: "cadencia da semana completa"
    saida: "vendas/outreach/{YYYY-SS}-resultado.md"
    dependencia: "monitorar-respostas"
    frequencia: "cron sexta 16h"
    kpis:
      - "Taxa conexao LinkedIn (>= 30%)"
      - "Taxa resposta total (>= 5%)"
      - "Taxa resposta positiva (>= 1.5%)"
      - "Taxa qualificacao (>= 60% das positivas)"
      - "Mensagens mais performaticas (input pra iteracao template)"

# ===== ON FAILURE =====
on_failure:
  taxa_resposta_baixa_2_semanas: "@ceo escala — revisar ICP OR mensagem OR canal"
  conta_linkedin_flagged: "pausa imediato + reduz volume + escala @ceo"
  email_dominio_blacklist: "@ceo escala — pode quebrar Gmail agencia inteira"
  lead_reclamou_lgpd: "remove imediato + @ceo audit lista origem"

# ===== METRICAS =====
metricas:
  volume_semanal: "50 leads novos/semana (configuravel)"
  taxa_qualificacao_alvo: ">= 1% (das mensagens enviadas → prospect qualificado)"
  custo_aquisicao_alvo: "<= 1/10 ticket medio cliente fechado"
  prazo_lead_ate_call: "<= 14 dias (D0 → call agendada)"

# ===== NOTAS =====
notas_importantes:
  - "Cold outreach é ARTE + dados — refinar template mensal baseado em resposta"
  - "NUNCA spray-and-pray — personalizacao real ou nao envia"
  - "Respeitar LGPD: opt-in OR dados publicos OR legitimo interesse declarado"
  - "Rate limit rigoroso pra preservar reputacao dominio + LinkedIn account"
  - "Aprendizados de perdidos alimentam refinamento ICP (icp-refinement.yaml trimestral)"
