nome: "decisao-estrategica"
descricao: "Estruturar decisao estrategica nao-trivial — opcoes + tradeoffs + recomendacao"
versao: "1.0"
gatilho: "Pedido @ceo (decisao complexa)"
agente_orquestrador: "coo"
agente_responsavel_entrega: "ceo"
qa_gate: false
sequencia:
  - {id: 1, etapa: "framing", agente: "ceo", saida: "problema + objetivo + restricoes"}
  - {id: 2, etapa: "gerar-opcoes", agente: "strategist", saida: "3-5 opcoes (incluindo no-action)"}
  - {id: 3, etapa: "analisar-tradeoffs", agente: "strategist", saida: "pros + contras + risco + custo cada"}
  - {id: 4, etapa: "recomendar", agente: "ceo", saida: "decisao formal + plano execucao"}
  - {id: 5, etapa: "executar", agente: "coo", saida: "trigger workflow execucao apropriado"}
metricas: {frequencia: "sob demanda"}
