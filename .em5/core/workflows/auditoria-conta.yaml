# Workflow: Auditoria de Conta de Anúncios
# Versao: 1.0 (Sprint 2 — Skills↔YAML)
# Agentes: coo → traffic (coleta + analisa) → qa (veredicto) → cs (apresenta)

nome: "auditoria-conta"
descricao: "Auditoria 30/60/90d de conta de anuncios (Meta Ads OU Google Ads OU ambos) — diagnostico sem alteracoes"
versao: "1.0"
gatilho: "Skill `/auditar {cliente} {plataforma}` OU pedido @ceo OU pre-onboarding nova conta"
agente_orquestrador: "coo"  # CLAUDE.md Regra 1
agente_responsavel_entrega: "cs"
qa_gate: true
read_only: true  # NUNCA altera campanhas, status, budget (regra absoluta da task)

inputs:
  - "nome cliente"
  - "plataforma (meta | google | ambos)"
  - "janela (default 90d)"
  - "clientes/{nome}/setup-tecnico/status.md (ad_account_id + BM_id)"
  - "clientes/{nome}/estrategia/plano-estrategico.md (referencia metas)"
  - "clientes/{nome}/memoria/notas-sessao.md (ultimas 3 entradas — contexto historico)"

outputs:
  - "clientes/{nome}/trafego/auditoria-{plataforma}-{YYYY-MM-DD}.md"
  - "clientes/{nome}/trafego/qa-verdict-{YYYY-MM-DD}.md"
  - "top 3 acoes priorizadas apresentadas ao usuario"

sequencia:

  - id: 1
    etapa: "carregar-contexto"
    agente: "traffic"
    task: "auditar-conta.md (meta) OU auditar-conta-google.md (google)"
    entrada:
      - "ad_account_id + BM_id (Meta) OU customer_id (Google Ads)"
      - "plano-estrategico.md (KPIs alvo)"
      - "memoria/notas-sessao.md ultimas 3 entradas"
    saida: "contexto carregado in-memory"
    dependencia: nenhuma

  - id: 2
    etapa: "coleta-meta-ads"
    agente: "traffic"
    task: "auditar-conta.md"
    entrada: "contexto carregado"
    saida: "dados crus 90d (campanhas + adsets + ads + insights + breakdowns)"
    composio_mcp: "meta_ads"
    composio_tools_essenciais:
      - "COMPOSIO_SEARCH_TOOLS"
      - "COMPOSIO_GET_TOOL_SCHEMAS"
      - "METAADS_GET_AD_ACCOUNTS"
      - "METAADS_LIST_ADS"
      - "METAADS_READ_ADSETS"
      - "METAADS_GET_INSIGHTS (totais + breakdowns idade/genero/placement)"
      - "METAADS_LIST_AD_CREATIVES"
      - "METAADS_GET_OBJECT (page + IG)"
    dependencia: "carregar-contexto"
    condicao: "plataforma in [meta, ambos]"

  - id: 3
    etapa: "coleta-google-ads"
    agente: "traffic"
    task: "auditar-conta-google.md"
    entrada: "contexto carregado"
    saida: "dados crus 90d (campanhas + ad_groups + keywords + ads + insights)"
    composio_mcp: "google_ads"
    dependencia: "carregar-contexto"
    condicao: "plataforma in [google, ambos]"
    rodar_em_paralelo: true  # com coleta-meta-ads se ambos

  - id: 4
    etapa: "analise-diagnostico"
    agente: "traffic"
    task: "auditar-conta.md"
    entrada: "dados crus + plano-estrategico"
    saida: "clientes/{nome}/trafego/auditoria-{plataforma}-{YYYY-MM-DD}.md"
    dependencia:
      - "coleta-meta-ads"
      - "coleta-google-ads"
    estrutura_relatorio:
      - "Resumo executivo (1 paragrafo + top 3 achados)"
      - "Setup tecnico (BM + conta + page + pixel + CAPI status)"
      - "Saude geral (gasto + CPL + CPA + conversoes + freq + delivery)"
      - "Estrutura campanhas (CBO vs ABO + segmentacao + budget distribution)"
      - "Performance criativa (top 5 vencedores + bottom 5 + padroes)"
      - "Audiencia (idade + genero + placement + horario)"
      - "Anomalias (TZ errada + page sem fans + ENG vs LEADS + saturacao)"
      - "Top 3 acoes priorizadas (urgente + medio prazo + estrategico)"
    importante: "Art. VI — toda limitacao reportada explicita (token expirado, sem acesso, etc.)"

  - id: 5
    etapa: "qa-auditoria"
    agente: "qa"
    task: "emitir-veredicto.md"
    entrada: "auditoria-{plataforma}-{YYYY-MM-DD}.md"
    saida: "clientes/{nome}/trafego/qa-verdict-{YYYY-MM-DD}.md"
    veredictos: ["APROVADO", "REVISAO", "BLOQUEADO"]
    checklist:
      - "Top 3 acoes acionaveis (nao vagas)"
      - "Cada anomalia tem evidencia numerica (nao opiniao)"
      - "Sem alteracoes propostas implementadas (read-only respeitado)"
      - "Limitacoes declaradas (Art. VI)"
      - "Coerencia com plano-estrategico (KPIs alvo referenciados)"
    dependencia: "analise-diagnostico"

  - id: 6
    etapa: "apresentar-resultado"
    agente: "cs"
    task: "registrar-interacao.md"
    entrada: "auditoria APROVADA"
    saida: "top 3 acoes apresentadas ao usuario + path do arquivo + sugestao proximo passo (/iterar ou ajustes especificos)"
    dependencia: "qa-auditoria"
    condicao: "qa-verdict == APROVADO"

  - id: 7
    etapa: "log-fechamento"
    agente: "cs"
    task: "registrar-interacao.md"
    entrada: "tudo concluido"
    saida: |
      Append em clientes/{nome}/operacao/log-operacional.md:
      `| {YYYY-MM-DD} | Auditoria {plataforma} 90d | Auditoria | APROVADO | Top 3 acoes apresentadas ao @ceo |`
    dependencia: "apresentar-resultado"

# ===== ON FAILURE =====
on_failure:
  qa_bloqueado: "@coo loop volta @traffic. Auto-retry: 1. Se 2x BLOQUEADO escala @ceo."
  conta_sem_acesso: "@traffic reporta explicit + @cs aciona cliente pra reenvio acesso"
  composio_falha: "@coo retry 3x backoff. Se persistir, agenda re-tentativa +24h"
  conta_suspensa: "trigger workflow conta-suspensa-meta.yaml (Sprint 7)"

# ===== METRICAS =====
metricas:
  duracao_alvo: "5-10 min por conta (paralelo: 4 contas em ~8 min)"
  tokens_alvo: "<= 120k por conta (cache + Art. IV)"
  taxa_aprovacao_qa_primeira: "> 90%"
  taxa_acoes_implementadas_pos: "> 60% (medir em iteracao seguinte)"

# ===== NOTAS =====
notas_importantes:
  - "Auditoria é READ-ONLY. NUNCA chama METAADS_CREATE_* ou UPDATE_*"
  - "Se cliente pedir 'auditoria + acao', auditoria primeiro (este workflow), depois /iterar separado"
  - "Janela 90d default. 30d/60d aceitos via param. < 30d nao recomendado (sem significancia estatistica)"
  - "Paralelizavel: ate 4 contas em paralelo via TaskCreate + run_in_background"
