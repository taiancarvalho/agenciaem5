nome: "renovacao-contrato"
descricao: "Pipeline renovacao — alerta 60d antes -> revisao resultados -> proposta -> assinatura"
versao: "1.0"
gatilho: "Cron diario: contrato vence em 60d?"
agente_orquestrador: "coo"
agente_responsavel_entrega: "vendas"
qa_gate: true

sequencia:
  - {id: 1, etapa: "alerta-60d", agente: "fin", saida: "lista contratos vencendo 60d"}
  - {id: 2, etapa: "revisao-resultados-12m", agente: "strategist", saida: "relatorio 12m + ROI cliente + casos sucesso"}
  - {id: 3, etapa: "preparar-proposta-renovacao", agente: "vendas", task: "criar-proposta.md", saida: "proposta nova (mesmo escopo OR upsell OR ajuste)"}
  - {id: 4, etapa: "aprovacao-ceo", agente: "ceo", saida: "veredicto (proposta APROVADA pra envio)"}
  - {id: 5, etapa: "apresentar-cliente", agente: "cs", duracao: "60min call dedicada", saida: "proposta apresentada + objecoes capturadas"}
  - {id: 6, etapa: "negociar-assinar", agente: "vendas", saida: "contrato novo assinado OR controlled-offboarding"}
  - {id: 7, etapa: "trigger-novo-contrato", agente: "coo", saida: "trigger contrato-cliente-novo.yaml com novo termos"}
metricas: {prazo_inicio: "60d antes vencimento", taxa_renovacao_alvo: ">= 80%", ticket_medio_renovacao: ">= contrato anterior"}
