# Workflow: Contrato Cliente Novo
# Versao: 1.0 (Sprint 8 — legal)
nome: "contrato-cliente-novo"
descricao: "Geração + revisão + assinatura digital de contrato pós-fechamento"
versao: "1.0"
gatilho: "Trigger do prospec-fechamento.yaml step fechamento"
agente_orquestrador: "coo"
agente_responsavel_entrega: "vendas"
qa_gate: true

inputs:
  - "proposta aprovada cliente + dados jurídicos"

outputs:
  - "clientes/{nome}/legal/contrato-{YYYY-MM-DD}.docx"
  - "clientes/{nome}/legal/contrato-{YYYY-MM-DD}-assinado.pdf"

sequencia:
  - id: 1
    etapa: "gerar-contrato"
    agente: "vendas"
    skill_externa: "/em5-proposta-docx"
    saida: "contrato.docx baseado em template agência + escopo proposta"
    template_padrao_clausulas:
      - "Objeto + escopo detalhado"
      - "Valor + reajuste + forma pagamento"
      - "Prazo + renovação automática"
      - "Confidencialidade + LGPD"
      - "Rescisão (multa + aviso prévio)"
      - "Propriedade intelectual (cliente dono dos assets gerados)"
      - "Limitação responsabilidade"
      - "Foro"

  - id: 2
    etapa: "revisar-ceo"
    agente: "ceo"
    saida: "veredicto (APROVADO | AJUSTAR)"
    cuidado_especial: "cláusulas customizadas pra esse cliente"

  - id: 3
    etapa: "enviar-assinatura"
    agente: "cs"
    saida: "contrato enviado via assinatura eletrônica"
    composio_mcp: ["docuseal", "documenso", "boldsign", "ignisign", "pandadoc", "eversign"]

  - id: 4
    etapa: "acompanhar-assinatura"
    agente: "cs"
    sla: "<= 7d cliente assinar"
    saida: "contrato-{YYYY-MM-DD}-assinado.pdf arquivado"
    follow_up: "D+3 + D+7 se não assinou"

  - id: 5
    etapa: "trigger-asaas-onboarding"
    agente: "coo"
    condicao: "contrato assinado"
    saida: "trigger cadastrar-asaas step do onboarding-cliente.yaml"

metricas:
  prazo_assinatura: "<= 7d"
  taxa_assinatura_sem_ajuste: ">= 80%"
