# Workflow: Reels Instagram
# Versao: 1.0 (Sprint 4 — conteúdo crítico)
nome: "reels-ig"
descricao: "Reels IG — roteiro + storyboard + edit + legenda + thumb com gancho 3s"
versao: "1.0"
gatilho: "Calendário editorial OR skill `/em5-roteiro-reels` OR pedido cliente"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: true

inputs:
  - "tema + objetivo (gerar comentários | educar | vender)"
  - "branding cliente"
  - "biblioteca de hooks que performaram (clientes/{nome}/social/log-performance-reels.md)"

outputs:
  - "clientes/{nome}/social/reels/{YYYY-MM-DD}/roteiro.md"
  - "clientes/{nome}/social/reels/{YYYY-MM-DD}/storyboard.md"
  - "clientes/{nome}/social/reels/{YYYY-MM-DD}/video.mp4 (60s vertical)"
  - "clientes/{nome}/social/reels/{YYYY-MM-DD}/legenda.md + thumb.png"

sequencia:
  - id: 1
    etapa: "definir-objetivo-hook"
    agente: "strategist"
    task: "criar-calendario-conteudo.md"
    saida: "objetivo + hook 3s + CTA"
    importante: "se objetivo == comentários → usar pattern instant-value-reels (oferece material em troca)"

  - id: 2
    etapa: "escrever-roteiro"
    agente: "copywriter"
    task: "escrever-post-social.md"
    skill_externa: "/em5-roteiro-reels (quando aplicável)"
    saida: "roteiro.md (60s = ~150 palavras; hook 3s + desenvolvimento + CTA explícito)"
    estrutura:
      0_3s: "hook visual + verbal — falha aqui = perdeu"
      3_45s: "desenvolvimento — 1 ideia por bloco de 5-7s"
      45_60s: "CTA específico (comenta palavra, segue, salva)"

  - id: 3
    etapa: "storyboard-edit"
    agente: "designer"
    task: "gerar-video.md"
    entrada: "roteiro + branding + biblioteca b-roll"
    saida: "video.mp4 1080×1920 60s + thumb.png + legendas embutidas (caption baked)"
    composio_mcp: ["wavespeed", "hyperframes"]

  - id: 4
    etapa: "legenda-feed"
    agente: "copywriter"
    task: "escrever-post-social.md"
    saida: "legenda.md (curta + hashtags relevantes + CTA refluxo)"

  - id: 5
    etapa: "qa-reels"
    agente: "qa"
    task: "validar-criativo.md + validar-copy.md"
    saida: "qa-verdict.md"
    checklist: ["hook 3s prende", "audio + visual sincronizados", "caption sem typo", "thumb chamativa fora do play", "duração 7-90s (sweet spot 30-60s)"]

  - id: 6
    etapa: "publicar-agendar"
    agente: "cs"
    saida: "publicado/agendado + log-performance-reels.md atualizado pós-publicação (D+7)"
    composio_mcp: ["instagram_business", "meta_business_suite"]

on_failure:
  qa_bloqueado: "@coo loop max 2x (roteiro ou edit)"
metricas:
  prazo: "<= 72h tema → publicado"
  alvo_views_org: "> 5x seguidores (sinal viral)"
  alvo_taxa_save: ">= 2%"
  alvo_taxa_comment: ">= 1.5% (objetivo conversational)"
