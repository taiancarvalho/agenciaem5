# Workflow: Stories Sequência IG
# Versao: 1.0 (Sprint 4 — conteúdo crítico)
nome: "stories-sequencia"
descricao: "Sequência 3-7 stories com stickers (poll/quiz/swipe) — diário ou pré-lançamento"
versao: "1.0"
gatilho: "Calendário diário OR pré-abertura carrinho OR pedido cliente"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: true

inputs:
  - "objetivo (engajar | aquecer audiência | converter)"
  - "branding cliente"

outputs:
  - "clientes/{nome}/social/stories/{YYYY-MM-DD}/frames/ (3-7 imagens/vídeos)"
  - "clientes/{nome}/social/stories/{YYYY-MM-DD}/script.md (com stickers definidos)"

sequencia:
  - id: 1
    etapa: "definir-objetivo-stickers"
    agente: "copywriter"
    task: "escrever-post-social.md"
    saida: "script.md (3-7 frames + sticker por frame + CTA final)"
    stickers_estrategicos:
      poll: "validação rápida (sim/não OR A/B)"
      quiz: "engajamento educativo"
      slider: "intensidade (de 0-100%)"
      pergunta: "lead capture (resposta DM)"
      countdown: "pré-lançamento/escassez real"
      swipe_up_link: "tráfego ativo (≥ 10k seguidores OR conta verificada)"

  - id: 2
    etapa: "design-frames"
    agente: "designer"
    task: "gerar-imagem.md"
    saida: "3-7 frames 1080×1920 + texto sobreposto + branding"

  - id: 3
    etapa: "qa-stories"
    agente: "qa"
    task: "validar-criativo.md"
    checklist: ["legível em mobile pequeno", "sticker tem posição lógica (não cobre rosto)", "CTA final claro", "branding consistente"]

  - id: 4
    etapa: "publicar"
    agente: "cs"
    saida: "publicado + capturar resultados stickers em D+1 (poll votes, quiz % corretas) → input @strategist"
    composio_mcp: "instagram_business"

on_failure:
  qa_bloqueado: "@coo loop 1x"
metricas:
  prazo: "<= 4h ideia → publicado (stories = velocidade)"
  alvo_completion_rate: ">= 70% (chega no último frame)"
  alvo_taps_forward: "< 30% (não está pulando)"
