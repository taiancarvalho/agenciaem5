nome: "branding-novo-cliente"
descricao: "Branding completo cliente sem identidade — logo + paleta + tipografia + style guide"
versao: "1.0"
gatilho: "Cliente novo sem branding OR rebranding"
agente_orquestrador: "coo"
agente_responsavel_entrega: "designer"
qa_gate: true

sequencia:
  - {id: 1, etapa: "discovery", agente: "strategist", saida: "personalidade marca + valores + concorrentes + arquetipo + tom"}
  - {id: 2, etapa: "moodboard", agente: "designer", saida: "3 direcoes visuais (referencias + paletas + tipos)"}
  - {id: 3, etapa: "aprovacao-cliente-direcao", agente: "cs", saida: "1 direcao escolhida"}
  - {id: 4, etapa: "logo", agente: "designer", saida: "3 variacoes logo + versao final + assinatura"}
  - {id: 5, etapa: "sistema-completo", agente: "designer", saida: "paleta (primaria + secundaria + funcional) + tipografia (display + body) + aplicacoes"}
  - {id: 6, etapa: "style-guide", agente: "designer", saida: "PDF style guide (uso correto + incorreto + grid + spacing)"}
  - {id: 7, etapa: "qa", agente: "qa", checklist: ["coerencia visual", "aplicavel todos formatos", "diferenciado concorrentes"]}
  - {id: 8, etapa: "entrega", agente: "cs", saida: "todos files + style guide + acesso designer pra suporte 30d"}
metricas: {prazo: "<= 30d", aprovacao_cliente_alvo: ">= 9/10"}
