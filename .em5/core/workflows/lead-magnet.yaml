nome: "lead-magnet"
descricao: "Material rico (ebook/template/checklist) -> captura -> nurture"
versao: "1.0"
gatilho: "Calendario marketing OR campanha especifica"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: true

sequencia:
  - {id: 1, etapa: "definir-tema-formato", agente: "strategist", saida: "tema + formato (PDF/template/checklist) + ICP"}
  - {id: 2, etapa: "produzir-material", agente: "copywriter", saida: "conteudo escrito (autoridade real, nao 5 dicas obvias)"}
  - {id: 3, etapa: "design-material", agente: "designer", saida: "material formatado (PDF profissional OR template usable)"}
  - {id: 4, etapa: "lp-captura", agente: "coo", saida: "trigger landing-page-build.yaml"}
  - {id: 5, etapa: "promocao", agente: "traffic", saida: "campanha + organico + email base"}
  - {id: 6, etapa: "entrega-automacao", agente: "cs", saida: "email automatico com download + trigger nurture"}
metricas: {custo_aquisicao_lead_alvo: "<= 1/3 ticket medio cliente", conversao_lead_cliente: ">= 2%"}
