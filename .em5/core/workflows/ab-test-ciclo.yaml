# Workflow: A/B Test Ciclo Completo
# Versao: 1.0 (Sprint 6 — analytics)
nome: "ab-test-ciclo"
descricao: "Hipótese → setup → run estatisticamente significativo → análise → decisão"
versao: "1.0"
gatilho: "Performance abaixo OR oportunidade hipótese OR pedido cliente"
agente_orquestrador: "coo"
agente_responsavel_entrega: "strategist"
qa_gate: true

inputs:
  - "hipótese formal (Se X, então Y, porque Z)"
  - "métrica primária (uma só)"
  - "amostra disponível (suficiente pra significância?)"

outputs:
  - "clientes/{nome}/ab-tests/{YYYY-MM-DD}-{nome-teste}/hipotese.md"
  - "clientes/{nome}/ab-tests/{YYYY-MM-DD}-{nome-teste}/setup.md"
  - "clientes/{nome}/ab-tests/{YYYY-MM-DD}-{nome-teste}/resultados.md"
  - "clientes/{nome}/ab-tests/{YYYY-MM-DD}-{nome-teste}/decisao.md"

sequencia:
  - id: 1
    etapa: "formular-hipotese"
    agente: "strategist"
    task: "criar-hipoteses.md"
    saida: "hipotese.md"
    estrutura:
      problema: "qual sintoma queremos resolver"
      hipotese: "Se X (mudança), então Y (resultado esperado), porque Z (mecanismo)"
      metrica_primaria: "uma só — CTR, CVR, CPL, etc."
      criterio_sucesso: "+X% com significância 95%"
      duracao_estimada: "calcular via calculator (amostra + baseline + MDE)"

  - id: 2
    etapa: "calcular-amostra"
    agente: "traffic"
    saida: "tamanho amostra mínimo + duração estimada"
    formula: "n por variante = 16 × p×(1-p) / (MDE)² (regra prática 95% conf)"
    importante: "se duração > 30d, teste inviável — reformular hipótese"

  - id: 3
    etapa: "setup-experimento"
    agente: "traffic"
    task: "estruturar-campanha.md"
    saida: "2 variantes ativas (A control + B test) + split 50/50 + UTM diferenciados"
    composio_mcp: ["meta_ads", "google_ads"]

  - id: 4
    etapa: "rodar-coletando"
    agente: "traffic"
    duracao: "min 7d OR amostra atingida"
    saida: "dados coletados sem mexer no setup (não interferir mid-test)"
    proibido: ["pausar variante perdedora mid-test", "mudar budget mid-test", "trocar criativo"]

  - id: 5
    etapa: "analise-significancia"
    agente: "strategist"
    task: "performance-analysis"
    saida: "resultados.md (p-value + intervalo confiança + lift)"
    decisao_regra:
      vencedora_clara: "p < 0.05 + lift > MDE — implementar"
      empate: "p > 0.05 OR lift < MDE — nada decisivo, manter A"
      perdedora: "B significativamente pior — descartar"

  - id: 6
    etapa: "qa-resultado"
    agente: "qa"
    checklist: ["amostra suficiente?", "p-value calculado correto?", "viés de seleção?", "horizonte temporal sem evento atípico (Black Friday, feriado)"]

  - id: 7
    etapa: "decisao-implementacao"
    agente: "strategist"
    saida: "decisao.md + rollout 100% vencedora OR descarte"

  - id: 8
    etapa: "documentar-aprendizado"
    agente: "strategist"
    saida: "input em learnings/ab-tests-{cliente}.md → biblioteca aprendizados (input ICP refinement + próxima hipótese)"

metricas:
  taxa_testes_decisivos: ">= 60% (vencedora OR perdedora clara)"
  aprendizados_aplicados: "100% documentados"
  taxa_lift_medio: "track ao longo trimestre"

on_failure:
  amostra_insuficiente: "@strategist reformula (objetivo menor OR teste em campanha maior)"
  resultado_inconclusivo: "documenta + roda novo teste com hipótese refinada"
