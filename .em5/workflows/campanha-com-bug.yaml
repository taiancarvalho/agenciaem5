nome: "campanha-com-bug"
descricao: "Anuncio com erro detectado em producao — pausa + corrige + relanca"
versao: "1.0"
gatilho: "Detectado erro: typo, preco errado, link quebrado, oferta expirada, criativo errado"
agente_orquestrador: "coo"
agente_responsavel_entrega: "traffic"
qa_gate: true
sla: "<= 1h pausa, <= 4h relancamento"

sequencia:
  - {id: 1, etapa: "pausar-imediato", agente: "traffic", sla: "<= 15min", saida: "campanha pausada em todas plataformas"}
  - {id: 2, etapa: "comunicar-cliente", agente: "cs", sla: "<= 30min", saida: "WhatsApp + email transparente"}
  - {id: 3, etapa: "root-cause", agente: "qa", saida: "porque passou? qa skip? mudanca tardia? falha processo?"}
  - {id: 4, etapa: "corrigir", agente: "copywriter OR designer", saida: "versao corrigida"}
  - {id: 5, etapa: "qa-correcao", agente: "qa", saida: "veredicto APROVADO + zero regressao"}
  - {id: 6, etapa: "relancar", agente: "traffic", saida: "campanha ativa novamente"}
  - {id: 7, etapa: "post-mortem", agente: "strategist", saida: "input em learnings + atualiza checklist QA pra evitar repetir"}
metricas: {tempo_pausa: "<= 15min", tempo_relancamento: "<= 4h", recidiva_zero: "objetivo"}
