nome: "offboarding"
descricao: "Cliente sai — handoff assets + encerra Asaas + post-mortem + relacao saudavel"
versao: "1.0"
gatilho: "Decisao formal de saida (cliente OR agencia)"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: false

sequencia:
  - {id: 1, etapa: "comunicacao-formal", agente: "cs", saida: "email + call confirmando saida + cronograma offboarding"}
  - {id: 2, etapa: "handoff-assets", agente: "cs", saida: "todos assets entregues (criativos + dados + relatorios + acessos transferidos)"}
  - {id: 3, etapa: "remover-acessos", agente: "cs", saida: "acessos agencia removidos: BM, GA4, GTM, redes sociais"}
  - {id: 4, etapa: "encerrar-asaas", agente: "fin", saida: "cobrancas futuras canceladas + ultima cobranca conciliada"}
  - {id: 5, etapa: "post-mortem-interno", agente: "strategist", saida: "aprendizado: porque saiu? evitavel? padrao identificado?"}
  - {id: 6, etapa: "input-icp-refinement", agente: "strategist", saida: "input pra icp-refinement.yaml (ajustar ICP futuro)"}
  - {id: 7, etapa: "relacao-saudavel", agente: "cs", saida: "porta aberta — case study se permitir + indicacao"}
metricas: {prazo_offboarding: "<= 30d", taxa_indicacao_pos_offboarding: ">= 10%"}
