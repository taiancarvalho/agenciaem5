# Workflow: Ata de Reunião (cliente-facing)
# Versao: 1.0 (Sprint 5)
nome: "ata-reuniao"
descricao: "Transcrição → ata estruturada cliente-facing com decisões + ações + prazos"
versao: "1.0"
gatilho: "Pós qualquer call cliente OR skill `/em5-call-para-sop`"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: true

inputs:
  - "gravação/transcrição call OR notas live"
  - "contexto cliente"

outputs:
  - "clientes/{nome}/reunioes/{YYYY-MM-DD}-{tipo}/transcricao.md"
  - "clientes/{nome}/reunioes/{YYYY-MM-DD}-{tipo}/ata-cliente.md (cliente-facing)"
  - "clientes/{nome}/reunioes/{YYYY-MM-DD}-{tipo}/ata-interna.md (decisões agência)"

sequencia:
  - id: 1
    etapa: "transcrever"
    agente: "cs"
    task: "registrar-interacao.md"
    saida: "transcricao.md (raw)"
    composio_mcp: ["happy-scribe", "deepgram", "rev-ai", "gladia"]

  - id: 2
    etapa: "estruturar-ata"
    agente: "cs"
    skill_externa: "/em5-call-para-sop"
    saida:
      - "ata-cliente.md (decisões + ações cliente + ações agência + prazos)"
      - "ata-interna.md (insights estratégicos + objeções não-ditas + risco churn)"
    estrutura_ata_cliente:
      - "Participantes + duração"
      - "Resumo executivo (3-5 bullets)"
      - "Decisões tomadas (tabela)"
      - "Ações + responsável + prazo (tabela)"
      - "Próxima reunião"

  - id: 3
    etapa: "qa-ata"
    agente: "qa"
    task: "validar-copy.md"
    checklist: ["sem fala atribuída errada", "decisões inequívocas", "prazos específicos", "tom profissional"]

  - id: 4
    etapa: "enviar-cliente"
    agente: "cs"
    saida: "ata-cliente.md enviada + arquivada"
    composio_mcp: "gmail"

metricas:
  prazo: "<= 24h pós-call"
  taxa_revisao_cliente: "< 20% (sinal qualidade)"
