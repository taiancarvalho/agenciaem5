nome: "webinar-captura"
descricao: "Webinar online — captura leads -> live -> nurture pos-evento"
versao: "1.0"
gatilho: "Estrategia inbound marketing (proprio OR cliente)"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: true

sequencia:
  - {id: 1, etapa: "definir-tema-data", agente: "strategist", saida: "tema + data + duracao + speakers + ICP alvo"}
  - {id: 2, etapa: "lp-captura", agente: "coo", saida: "trigger landing-page-build.yaml com form captura"}
  - {id: 3, etapa: "promocao-pre-evento", agente: "traffic", saida: "campanha Meta + email base + LinkedIn 14d antes"}
  - {id: 4, etapa: "executar-live", agente: "cs", composio_mcp: ["go-to-webinar", "demio", "googlemeet"], saida: "live + gravacao + chat capturado"}
  - {id: 5, etapa: "follow-up-presentes", agente: "cs", task: "enviar-relatorio.md", saida: "email D+1 (gravacao + bonus + oferta)"}
  - {id: 6, etapa: "trigger-nurture", agente: "coo", saida: "trigger email-nurture-drip.yaml pra novos leads"}
  - {id: 7, etapa: "relatorio-resultado", agente: "strategist", saida: "leads gerados + conversao oferta + ROI"}
metricas: {taxa_show_up: ">= 30%", conversao_oferta_alvo: ">= 5%"}
