nome: "whatsapp-onboarding-cliente"
descricao: "Sequencia onboarding novo cliente fechado — Dia 0/1/3/7 guiada via WhatsApp"
versao: "1.0"
gatilho: "Trigger automatico do onboarding-cliente.yaml v2.0 (paralelo aos emails)"
agente_orquestrador: "coo"
agente_responsavel_entrega: "whats + cs"
qa_gate: false
modo: "rascunho-padrao"

cadencia_obrigatoria:
  D_0_apos_contrato: "boas-vindas + cronograma proximos 7 dias + contato direto @cs"
  D_1: "lembrete: acessos pendentes (BM + GA + branding)"
  D_3: "check briefing (preencheu? duvida?)"
  D_5: "kickoff agendado — confirma data/hora + materiais"
  D_7: "primeira semana fechada — tudo claro? proximo passo: 1a campanha"

sequencia:
  - {id: 1, etapa: "trigger-pos-contrato", agente: "coo", saida: "cadencia agendada D+0 a D+7"}
  - {id: 2, etapa: "mensagem-D0", agente: "whats", task: "enviar-template.md", saida: "boas-vindas + link calendar onboarding"}
  - {id: 3, etapa: "mensagem-D1-D7", agente: "whats", saida: "sequencia conforme cadencia + personalizada por perfil cliente"}
  - {id: 4, etapa: "monitorar-aderencia", agente: "cs", saida: "cliente cumprindo prazos? acessos chegaram? briefing preenchido?"}
  - {id: 5, etapa: "escalar-atraso", agente: "cs", condicao: "atraso > 3d em qualquer entrega cliente", saida: "call humana pra desbloquear"}

stop_rules:
  - "cliente respondeu tudo + completo → cadencia cumpre objetivo, encerra"
  - "cliente quer pausar onboarding → @ceo decide"

metricas:
  taxa_acessos_d_7: "100% (todos recebidos)"
  taxa_briefing_completo_d_5: ">= 90%"
  satisfacao_pos_onboarding: ">= 9/10 NPS"
