nome: "youtube-longform"
descricao: "Video YouTube long-form (5-15min) — keyword research + roteiro + b-roll + SEO + thumb"
versao: "1.0"
gatilho: "Pedido cliente (canal ativo) OR estrategia inbound video"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: true

sequencia:
  - {id: 1, etapa: "keyword-yt", agente: "strategist", saida: "palavra-chave YT + intent + concorrencia"}
  - {id: 2, etapa: "roteiro", agente: "copywriter", saida: "roteiro completo (hook 15s + intro + conteudo + CTA)"}
  - {id: 3, etapa: "b-roll-list", agente: "designer", saida: "lista cenas + assets necessarios"}
  - {id: 4, etapa: "edicao", agente: "designer", task: "gerar-video.md", saida: "video.mp4 16:9"}
  - {id: 5, etapa: "thumb-titulo", agente: "designer", saida: "3 variacoes thumb (A/B test) + titulo otimizado"}
  - {id: 6, etapa: "seo-descricao", agente: "copywriter", saida: "descricao otimizada + timestamps + tags"}
  - {id: 7, etapa: "qa", agente: "qa", checklist: ["hook 15s prende", "audio limpo", "thumb chamativa", "descricao SEO"]}
  - {id: 8, etapa: "publicar", agente: "cs", composio_mcp: "youtube"}
metricas: {prazo: "<= 14d", alvo_ctr_thumb: ">= 5%", alvo_retention: ">= 50%"}
