# Workflow: Blog SEO
# Versao: 1.0 (Sprint 4 — conteúdo crítico)
nome: "blog-seo"
descricao: "Post blog otimizado SEO — keyword research → outline → 1500-2500 palavras → on-page → publica"
versao: "1.0"
gatilho: "Calendário editorial (1-4 posts/mês) OR estratégia inbound"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: true

inputs:
  - "nicho cliente + concorrentes SEO"
  - "acesso CMS cliente (WordPress, Webflow, etc)"

outputs:
  - "clientes/{nome}/blog/{YYYY-MM-DD}-{slug}/keyword-research.md"
  - "clientes/{nome}/blog/{YYYY-MM-DD}-{slug}/outline.md"
  - "clientes/{nome}/blog/{YYYY-MM-DD}-{slug}/post.md (1500-2500 palavras)"
  - "post publicado no CMS + indexação Google Search Console"

sequencia:
  - id: 1
    etapa: "keyword-research"
    agente: "strategist"
    task: "analisar-concorrentes.md"
    saida: "keyword-research.md (palavra-chave primária + 3-5 secundárias + intent + dificuldade + volume)"
    composio_mcp: ["semrush", "ahrefs", "google_search_console", "perigon"]
    criterios: ["volume mensal >= 500 (BR)", "dificuldade <= 50 (DR cliente alvo)", "intent informacional OR comercial"]

  - id: 2
    etapa: "outline-seo"
    agente: "copywriter"
    task: "criar-conceitos.md"
    saida: "outline.md (H1 + 5-8 H2 + sub-bullets + FAQ + meta description + slug)"
    estrutura_seo:
      H1: "contém keyword primária + benefit"
      H2_primeiro: "responde intent direto (featured snippet target)"
      H2_intermediarios: "subtemas keywords secundárias"
      H2_FAQ: "5-7 perguntas People Also Ask"
      meta_desc: "150-160 chars + keyword + CTA"
      slug: "kebab-case + keyword (máximo 5 palavras)"

  - id: 3
    etapa: "escrever-post"
    agente: "copywriter"
    task: "escrever-copy.md"
    saida: "post.md (1500-2500 palavras + imagens placeholder + links internos sugeridos + links externos autoridade)"
    regras:
      densidade_keyword: "1-2% (não keyword stuffing)"
      paragrafos_curtos: "max 3-4 linhas mobile"
      bullets_listas: "quebrar texto denso"
      links_internos: "3-5 pra outros posts cliente (SEO juice)"
      links_externos: "1-2 fonte autoridade (Wikipedia, .gov, estudo citado)"

  - id: 4
    etapa: "imagens-otimizadas"
    agente: "designer"
    task: "gerar-imagem.md"
    saida: "3-5 imagens + alt-text + compressão (< 200kb cada)"

  - id: 5
    etapa: "qa-seo"
    agente: "qa"
    task: "validar-landing-page.md"
    checklist:
      - "H1 único + keyword presente"
      - "Meta desc 150-160 chars"
      - "Slug otimizado"
      - "Alt-text em todas imagens"
      - "Links internos/externos funcionais"
      - "Densidade keyword 1-2%"
      - "Tempo leitura calculado (~200 wpm)"
      - "FAQ schema markup (JSON-LD)"
      - "Sem typo ou problema gramatical"

  - id: 6
    etapa: "publicar-cms"
    agente: "cs"
    saida: "post publicado + submetido Search Console + compartilhado redes sociais"
    composio_mcp: ["wordpress", "webflow", "google_search_console"]

  - id: 7
    etapa: "monitorar-ranking"
    agente: "traffic"
    task: "monitorar-performance.md"
    saida: "ranking keyword em D+30, D+60, D+90 (Search Console + SEMrush)"
    frequencia: "cron mensal"

on_failure:
  qa_bloqueado: "@coo loop 1x"
  ranking_pos_60d_ruim: "@strategist analisa + recomenda update conteúdo OR backlinks"
metricas:
  prazo_producao: "<= 7d keyword → publicado"
  ranking_alvo_d90: "top 10 (page 1)"
  trafego_organico_alvo_6m: ">= 500 visits/mês"
