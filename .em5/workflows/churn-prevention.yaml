# Workflow: Churn Prevention
# Versao: 1.0 (Sprint 5 — reativo)
nome: "churn-prevention"
descricao: "Pipeline reativo quando sinais de churn detectados — salvar cliente antes de pedir cancelamento"
versao: "1.0"
gatilho: "Trigger por sinais: atraso pagamento OR NPS baixo OR redução engajamento OR comentário negativo cliente OR queda performance 2+ meses"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: false
sla: "<= 48h pós-detecção"

inputs:
  - "sinal detectado (qual + severidade + cliente)"
  - "histórico cliente (financeiro + relatórios + relacionamento)"

outputs:
  - "clientes/{nome}/risco-churn/{YYYY-MM-DD}/diagnostico.md"
  - "clientes/{nome}/risco-churn/{YYYY-MM-DD}/plano-recuperacao.md"
  - "decisão @ceo (manter | renegociar | offboarding controlado)"

sequencia:
  - id: 1
    etapa: "consolidar-sinais"
    agente: "coo"
    task: "delegar-operacao.md"
    saida: "diagnostico.md (todos sinais cruzados + severidade total)"
    sinais_monitorados:
      financeiro: "atraso 5d+ OR 2+ falhas/12m"
      satisfacao: "NPS <= 6 OR comentário negativo"
      engajamento: "não responde reuniões 2+ semanas"
      performance: "queda KPI 30%+ vs trimestre anterior"
      comportamental: "menciona concorrente OR pede revisão escopo"

  - id: 2
    etapa: "analise-causa-raiz"
    agente: "strategist"
    task: "analisar-call.md"
    saida: "causa raiz + probabilidade churn (BAIXA/MÉDIA/ALTA) + estratégia salvamento"

  - id: 3
    etapa: "preparar-call-retencao"
    agente: "cs"
    task: "preparar-reuniao.md"
    saida: "agenda call retenção (não vender, ouvir) + dados pra mostrar valor + soluções pré-pensadas"

  - id: 4
    etapa: "executar-call-retencao"
    agente: "cs"
    duracao: "45-60min"
    pauta:
      - "Reconhecer problema explicitamente (5min)"
      - "Ouvir cliente sem interromper (15min)"
      - "Mostrar dados de valor entregue (10min)"
      - "Propor solução específica ao problema (15min)"
      - "Acordo + próximos passos (10min)"
    proibido: ["jogo de defesa", "diminuir problema", "promessa vazia"]

  - id: 5
    etapa: "decisao-ceo"
    agente: "ceo"
    task: "decisao.md"
    entrada: "diagnostico + resultado call retenção"
    saida: "decisão formal"
    opcoes:
      MANTER: "acordo fechado — executar plano-recuperacao"
      RENEGOCIAR: "redução escopo OR desconto OR mudança escopo"
      OFFBOARDING_CONTROLADO: "cliente decide sair — trigger offboarding.yaml (Sprint 5+)"

  - id: 6
    etapa: "executar-plano"
    agente: "coo"
    saida: "plano-recuperacao.md em execução + monitoramento semanal 60d"
    monitoramento:
      "D+7": "verifica se ação combinada foi executada"
      "D+30": "mede sinais novamente"
      "D+60": "decisão definitiva (salvou OR confirma offboarding)"

  - id: 7
    etapa: "post-mortem-aprendizado"
    agente: "strategist"
    saida: "aprendizado em learnings/churn-cases.md → input ICP refinement + onboarding melhorias"

on_failure:
  cliente_recusa_call: "@cs liga insistir 1x + se segue recusa, oferta plano cancelamento controlado"
  acordo_quebrado_d30: "trigger offboarding com cuidado (cliente saudoso muito mais valioso que cliente raivoso)"
metricas:
  taxa_recuperacao_alvo: ">= 60% (não-churn em 60d)"
  prazo_resposta: "<= 48h pós-detecção"
  custo_aquisicao_evitado: "tracked vs LTV cliente"
