# Workflow: QBR Trimestral (Quarterly Business Review)
# Versao: 1.0 (Sprint 5)
nome: "qbr-trimestral"
descricao: "Revisão trimestral executiva — performance 3M + decisões + plano próximos 3M"
versao: "1.0"
gatilho: "Cron trimestral (último mês trimestre) OR pedido cliente"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: true

inputs:
  - "dados 3M campanhas + KPIs definidos no plano-estrategico"
  - "histórico relatórios mensais"

outputs:
  - "clientes/{nome}/qbr/{YYYY-Q}/dados-consolidados.md"
  - "clientes/{nome}/qbr/{YYYY-Q}/deck-qbr.pptx (cliente-facing)"
  - "clientes/{nome}/qbr/{YYYY-Q}/plano-proximo-trimestre.md"

sequencia:
  - id: 1
    etapa: "consolidar-dados-3m"
    agente: "traffic"
    task: "gerar-relatorio.md"
    saida: "dados-consolidados.md (Meta + Google + analytics + organico — 3M vs 3M anterior)"
    composio_mcp: ["meta_ads", "google_ads", "google_analytics"]

  - id: 2
    etapa: "revisar-plano-estrategico"
    agente: "strategist"
    task: "criar-plano-estrategico.md"
    saida: "plano-proximo-trimestre.md (hipóteses confirmadas/refutadas + nova direção + KPIs revisados)"
    inclui:
      - "Resultados vs metas trimestre (%)"
      - "Top 3 vitórias + Top 3 aprendizados"
      - "Hipóteses para próximo trimestre"
      - "Mudanças de canal/orçamento sugeridas"
      - "Risco churn? (sinais)"

  - id: 3
    etapa: "montar-deck-qbr"
    agente: "cs"
    skill_externa: "/em5-deck-pptx"
    saida: "deck-qbr.pptx (15-20 slides executivo)"
    estrutura:
      - "Capa + agenda"
      - "Resumo executivo (1 slide)"
      - "Resultados trimestre (3-5 slides)"
      - "Aprendizados (2-3 slides)"
      - "Plano próximo trimestre (3-5 slides)"
      - "Decisões pedidas ao cliente (1 slide)"
      - "Próximos passos"

  - id: 4
    etapa: "qa-qbr"
    agente: "qa"
    task: "emitir-veredicto.md"
    checklist: ["dados coerentes com relatórios mensais", "decisões pedidas claras", "tom executivo (não operacional)"]

  - id: 5
    etapa: "apresentar-cliente"
    agente: "cs"
    duracao: "60-90min"
    composio_mcp: ["googlemeet", "googlecalendar"]
    importante: "QBR é reunião decisão — cliente assina plano novo trimestre"

  - id: 6
    etapa: "documentar-decisoes"
    agente: "cs"
    saida: "ata QBR + plano-proximo-trimestre.md assinado/aprovado cliente → input pra renovacao-contrato"

metricas:
  prazo: "<= 15 dias úteis pós-fechamento trimestre"
  taxa_renovacao_pos_qbr: ">= 90%"
