# Workflow: Lookalike Refresh (Manutenção mensal)
# Versao: 1.0 (Sprint 7 — manutenção)
nome: "lookalike-refresh"
descricao: "Atualização mensal LAL com base seed nova — preserva performance audiências"
versao: "1.0"
gatilho: "Cron mensal (dia 5)"
agente_orquestrador: "coo"
agente_responsavel_entrega: "traffic"
qa_gate: false

inputs:
  - "base seed atual (compradores 30d/90d, leads qualificados, etc.)"

outputs:
  - "clientes/{nome}/trafego/audiencias/lookalike-{YYYY-MM}.md"
  - "campanhas usando LAL atualizadas"

sequencia:
  - id: 1
    etapa: "exportar-seed-atualizada"
    agente: "traffic"
    saida: "lista IDs/emails/phones hash da seed (1000-50000 ideal)"
    composio_mcp: ["meta_ads", "google_ads", "shopify", "stripe"]
    fontes_seed:
      compradores: "últimos 90d"
      leads_qualificados: "MQL+SQL"
      alto_engajamento: "video views 75%+ OR scroll 75%+"

  - id: 2
    etapa: "criar-lal-nova"
    agente: "traffic"
    saida: "LAL 1-3% Brasil + LAL 3-5% se conta grande"
    composio_mcp: "meta_ads"

  - id: 3
    etapa: "atualizar-campanhas"
    agente: "traffic"
    saida: "ad sets usando LAL antiga migrados pra nova (overlap permitido durante transição)"
    estrategia: "duplicar ad set + ativar nova + pausar antiga após 7d se nova performa"

  - id: 4
    etapa: "monitorar-7d"
    agente: "traffic"
    saida: "comparação CPL/CPA nova vs antiga"

metricas:
  cadencia: "mensal dia 5"
  taxa_performance_alvo: "manter OR melhorar CPL antiga"
