# Workflow: Newsletter Semanal
# Versao: 1.0 (Sprint 4 — conteúdo crítico)
nome: "newsletter"
descricao: "Newsletter semanal — curadoria + escrita + segment + send + relatório abertura"
versao: "1.0"
gatilho: "Cron semanal (ex: terça 9h) OR campanha específica"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: true

inputs:
  - "tema da semana (calendário) + base ativa cliente"
  - "branding email (header + footer + cores)"

outputs:
  - "clientes/{nome}/email/newsletters/{YYYY-MM-DD}/conteudo.md"
  - "clientes/{nome}/email/newsletters/{YYYY-MM-DD}/html-final.html"
  - "clientes/{nome}/email/newsletters/{YYYY-MM-DD}/relatorio-d3.md"

sequencia:
  - id: 1
    etapa: "definir-tema-curadoria"
    agente: "strategist"
    saida: "tema principal + 2-3 itens curadoria (link + comentário)"

  - id: 2
    etapa: "escrever-newsletter"
    agente: "copywriter"
    task: "escrever-copy-email.md"
    saida: "conteudo.md"
    estrutura:
      subject: "<= 50 chars + curiosity + sem CAPS"
      preview: "<= 90 chars complementa subject (não repete)"
      saudacao: "personalizado quando dado disponível"
      corpo: "300-600 palavras (mobile-first, parágrafos curtos)"
      cta_unico: "1 ação clara (não bombardear)"
      ps: "P.S. opcional (alta taxa leitura)"

  - id: 3
    etapa: "render-html-email"
    agente: "designer"
    saida: "html-final.html (responsivo + dark mode safe + < 100kb)"

  - id: 4
    etapa: "qa-email"
    agente: "qa"
    task: "validar-copy.md + validar-landing-page.md"
    checklist:
      - "Subject sem trigger spam (FREE!, $$$, CAPS, !!!)"
      - "Render mobile + desktop OK"
      - "Dark mode legível"
      - "Links rastreáveis (UTM)"
      - "Unsubscribe footer presente"
      - "Sem imagens-only (filtro spam)"

  - id: 5
    etapa: "segmentar-enviar"
    agente: "cs"
    task: "enviar-relatorio.md"
    saida: "enviado pra segmento alvo + log envio"
    composio_mcp: ["mailchimp", "resend", "sendlane", "convertkit", "active-campaign"]
    segmentacao: "engajados últimos 90d default (preserva reputação domínio)"

  - id: 6
    etapa: "relatorio-d3"
    agente: "cs"
    saida: "relatorio-d3.md (open rate + click rate + unsubscribe + reply)"
    frequencia: "cron D+3 pós envio"
    benchmarks_alvo:
      open_rate: ">= 25%"
      click_rate: ">= 3%"
      unsubscribe: "< 0.5%"

on_failure:
  qa_bloqueado: "@coo loop 1x"
  bounce_rate_alto: "@cs limpa base + @ceo escala (reputação domínio em risco)"
  spam_complaints: "PAUSA imediata + @ceo + revisar lista origem (compliance)"
metricas:
  prazo: "<= 24h ideia → enviado"
  open_rate: ">= 25%"
  reply_rate: ">= 1% (sinal qualidade)"
