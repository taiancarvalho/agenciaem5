nome: "email-nurture-drip"
descricao: "Sequencia 5-7 emails com gatilho comportamental — nutrir lead -> compra"
versao: "1.0"
gatilho: "Lead novo entra na base OR comportamento especifico (download ebook, abandonou carrinho)"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: true

sequencia:
  - {id: 1, etapa: "mapear-jornada", agente: "strategist", saida: "jornada 5-7 etapas (gatilho -> objetivo final)"}
  - {id: 2, etapa: "escrever-emails", agente: "copywriter", task: "escrever-copy-email.md", saida: "5-7 emails (subject + preview + corpo + CTA)"}
  - {id: 3, etapa: "render-html", agente: "designer", saida: "templates HTML responsivos"}
  - {id: 4, etapa: "qa", agente: "qa", checklist: ["sem spam triggers", "gatilho comportamental correto", "delay entre emails coerente", "CTA progressivo"]}
  - {id: 5, etapa: "configurar-automacao", agente: "cs", composio_mcp: ["mailchimp", "active-campaign", "convertkit", "kit", "sendlane"]}
  - {id: 6, etapa: "monitorar-30d", agente: "cs", saida: "open/click/conversao por email -> otimizacao"}
metricas: {open_rate: ">= 30%", click_rate: ">= 4%", conversao_sequencia: ">= 5%"}
