nome: "ugc-creator-pipeline"
descricao: "Briefing UGC creator -> contratacao -> recebimento -> edit -> publicacao"
versao: "1.0"
gatilho: "Estrategia campanha UGC OR pedido cliente"
agente_orquestrador: "coo"
agente_responsavel_entrega: "designer"
qa_gate: true

sequencia:
  - {id: 1, etapa: "brief-creator", agente: "copywriter", saida: "brief detalhado (produto + tom + estrutura + entregaveis + DOs DONTs)"}
  - {id: 2, etapa: "selecionar-contratar", agente: "cs", saida: "creator escolhido + contrato + payment"}
  - {id: 3, etapa: "acompanhar-producao", agente: "cs", saida: "feedback em sketch/preview antes da final"}
  - {id: 4, etapa: "receber-final", agente: "designer", saida: "raw files armazenados"}
  - {id: 5, etapa: "edit-adaptacao", agente: "designer", saida: "versoes por canal (Reels/Stories/Feed) + branding inserido"}
  - {id: 6, etapa: "qa", agente: "qa", checklist: ["tom autentico (nao parece ad)", "claims OK (LGPD)", "branding sutil", "compliance plataforma"]}
  - {id: 7, etapa: "publicar-testar", agente: "traffic", saida: "rotaciona em campanha + mede performance vs criativo agencia"}
metricas: {custo_ugc_alvo: "<= 30% custo criativo agencia", cvr_uplift_alvo: ">= 20% vs criativo padrao"}
