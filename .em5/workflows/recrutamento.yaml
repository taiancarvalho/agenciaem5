nome: "recrutamento"
descricao: "Vaga -> divulgacao -> triagem -> entrevista -> contratacao"
versao: "1.0"
gatilho: "Demanda crescimento OR substituicao"
agente_orquestrador: "coo"
agente_responsavel_entrega: "ceo"
qa_gate: false
sequencia:
  - {id: 1, etapa: "definir-vaga", agente: "ceo", saida: "job description + perfil + faixa salarial"}
  - {id: 2, etapa: "divulgar", agente: "cs", composio_mcp: ["recruitee", "workable", "ashby"], saida: "vaga publica"}
  - {id: 3, etapa: "triagem", agente: "ceo", saida: "shortlist"}
  - {id: 4, etapa: "entrevistar", agente: "ceo", saida: "decisao final"}
  - {id: 5, etapa: "contratar-onboard", agente: "cs", saida: "trigger treinamento-equipe.yaml"}
metricas: {prazo: "<= 45d vaga -> contratado"}
