nome: "custom-audience-hygiene"
descricao: "Trimestral — remove audiencias < 1000 OR sem uso (preserva conta limpa)"
versao: "1.0"
gatilho: "Cron trimestral"
agente_orquestrador: "coo"
agente_responsavel_entrega: "traffic"
qa_gate: false

sequencia:
  - {id: 1, etapa: "listar-audiencias", agente: "traffic", composio_mcp: "meta_ads", saida: "audiencias + tamanho + ultima utilizacao"}
  - {id: 2, etapa: "identificar-obsoletas", agente: "traffic", saida: "audiencias < 1000 OR nao usadas 180d+"}
  - {id: 3, etapa: "remover", agente: "traffic", saida: "audiencias deletadas (com backup nome+criterio em log)"}
metricas: {cadencia: "trimestral", contas_limpas: ">= 80% audiencias ativas e relevantes"}
