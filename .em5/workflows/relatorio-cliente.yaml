# Workflow: Relatório de Performance ao Cliente
# Versao: 1.0 (Sprint 2 — Skills↔YAML)
# Agentes: coo (orquestra) → traffic (coleta) → cs (render HTML) → qa (valida) → cs (envia Gmail)

nome: "relatorio-cliente"
descricao: "Gera + envia relatorio mensal/semanal de performance ao cliente (markdown + HTML Reportei-style + email Gmail)"
versao: "1.0"
gatilho: "Skill `/relatorio {cliente}` OU cron mensal (dia 1) OU cron semanal (sex 17h)"
agente_orquestrador: "coo"  # CLAUDE.md Regra 1
agente_responsavel_entrega: "cs"
qa_gate: true

inputs:
  - "nome cliente"
  - "periodo (data_inicio + data_fim) — default: ultimo mes fechado"
  - "clientes/{nome}/setup-tecnico/status.md (IDs Meta + GA4 + IG + FB)"
  - "clientes/{nome}/branding/cores.yaml"
  - "em5-config.yaml (nome agencia)"
  - ".em5/system/templates/relatorios/relatorio-cliente.html (template)"

outputs:
  - "clientes/{nome}/relatorios/relatorio-{YYYY-MM-DD}.md"
  - "clientes/{nome}/relatorios/relatorio-{YYYY-MM-DD}.html"
  - "clientes/{nome}/relatorios/qa-verdict-{YYYY-MM-DD}.md"
  - "email enviado ao cliente via Gmail Composio (HTML inline + .md anexo)"

sequencia:

  - id: 1
    etapa: "coleta-dados"
    agente: "traffic"
    task: "gerar-relatorio.md"
    entrada:
      - "ad_account_id (Meta) + customer_id (Google Ads se aplicavel)"
      - "GA4 property + IG handle + FB page"
      - "periodo + periodo anterior comparavel"
    saida: "clientes/{nome}/relatorios/relatorio-{YYYY-MM-DD}.md"
    composio_mcp: ["meta_ads", "google_analytics", "instagram_business", "facebook_pages", "google_ads"]
    dependencia: nenhuma
    estrutura_markdown:
      - "Hero KPIs (investido + conversas + CPC/conversa) com delta"
      - "Meta Ads (campanhas + anuncios + idade + genero + dia)"
      - "Instagram (visitas + views + cidades + posts + reels)"
      - "Facebook (seguidores + alcance + engajamento)"
      - "Google Analytics (sessoes + conversoes + canais)"
      - "Próximos passos"
    importante: "Art. VI — se fonte sem dado, marcar 'nao aplicavel'. NUNCA fabrica numero."

  - id: 2
    etapa: "render-html"
    agente: "cs"
    task: "enviar-relatorio.md"
    entrada:
      - "relatorio-{YYYY-MM-DD}.md"
      - ".em5/system/templates/relatorios/relatorio-cliente.html"
      - "clientes/{nome}/branding/cores.yaml"
    saida: "clientes/{nome}/relatorios/relatorio-{YYYY-MM-DD}.html"
    dependencia: "coleta-dados"
    validacao_automatica: "varre HTML pra residuo `{{...}}` — sobrou placeholder = BLOQUEIO automatico"

  - id: 3
    etapa: "qa-relatorio"
    agente: "qa"
    task: "emitir-veredicto.md"
    entrada:
      - "relatorio-{YYYY-MM-DD}.md"
      - "relatorio-{YYYY-MM-DD}.html"
      - "clientes/{nome}/estrategia/plano-estrategico.md (pra checar coerencia metas)"
    saida: "clientes/{nome}/relatorios/qa-verdict-{YYYY-MM-DD}.md"
    veredictos: ["APROVADO", "REVISAO", "BLOQUEADO"]
    checklist:
      - "Coerencia markdown ↔ HTML (sem divergencia numerica)"
      - "Sem residuo `{{...}}` (placeholder nao substituido = BLOQUEADO)"
      - "Graficos SVG tem pontos (polyline nao-vazia)"
      - "Tabelas tem >= 1 linha (ou marcada 'nao aplicavel')"
      - "Sem links quebrados"
      - "Cores branding aplicadas no header"
    dependencia: "render-html"

  - id: 4
    etapa: "envio-cliente"
    agente: "cs"
    task: "enviar-relatorio.md"
    entrada:
      - "relatorio-{YYYY-MM-DD}.html (APROVADO)"
      - "relatorio-{YYYY-MM-DD}.md (anexo)"
      - "lista emails cliente (clientes/{nome}/onboarding/board-cliente.md)"
    saida: "email enviado + log-operacional atualizado"
    composio_mcp: "gmail"
    dependencia: "qa-relatorio"
    condicao: "qa-verdict == APROVADO"
    assunto: "[{{nome_agencia}}] Relatório {{periodo}} — {{nome_cliente}}"

  - id: 5
    etapa: "log-fechamento"
    agente: "cs"
    task: "registrar-interacao.md"
    entrada: "email enviado OK"
    saida: |
      Append em clientes/{nome}/operacao/log-operacional.md:
      `| {YYYY-MM-DD} | Relatório {periodo} | Relatório | APROVADO | HTML Reportei-style enviado via Gmail |`
    dependencia: "envio-cliente"

# ===== ON FAILURE =====
on_failure:
  qa_bloqueado: "@coo loop volta @cs ou @traffic conforme motivo. Auto-retry: 1. Se 2x BLOQUEADO, escala @ceo."
  composio_falha: "@coo retry 3x com backoff. Se persistir, escala + comunica cliente atraso."
  gmail_falha: "@coo fallback Slack/WhatsApp + notifica @ceo"

# ===== METRICAS =====
metricas:
  prazo_mensal: "<= 3 dias uteis apos fechamento periodo"
  prazo_semanal: "<= 1 dia util apos sexta"
  taxa_aprovacao_qa_primeira: "> 85%"
  taxa_abertura_email_alvo: "> 60% (medir via Gmail tracking se disponivel)"
