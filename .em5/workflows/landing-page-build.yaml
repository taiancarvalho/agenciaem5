# Workflow: Landing Page Build
# Versao: 1.0 (Sprint 8 — assets)
nome: "landing-page-build"
descricao: "LP de conversão completa — strategy + copy + design + dev + QA + publish"
versao: "1.0"
gatilho: "Skill `/extrair-design` OR pedido cliente (campanha tráfego)"
agente_orquestrador: "coo"
agente_responsavel_entrega: "cs"
qa_gate: true

inputs:
  - "briefing oferta (produto/serviço + ICP + CTA)"
  - "branding cliente"

outputs:
  - "clientes/{nome}/landing-pages/{slug}/wireframe.md"
  - "clientes/{nome}/landing-pages/{slug}/copy.md"
  - "clientes/{nome}/landing-pages/{slug}/design/ (figma + assets)"
  - "clientes/{nome}/landing-pages/{slug}/index.html (deploy)"

sequencia:
  - id: 1
    etapa: "wireframe-estrategico"
    agente: "strategist"
    saida: "wireframe.md (estrutura por sessão + cada bloco com objetivo conversão)"
    estrutura_alta_conversao:
      - "Hero: promessa + benefício + CTA acima da dobra"
      - "Prova social (logos + depoimentos)"
      - "Dor problema (espelha cliente)"
      - "Solução (como produto resolve)"
      - "Benefícios concretos (3-5 bullets)"
      - "Como funciona (3 steps)"
      - "Garantia/risco zero"
      - "Preço/oferta"
      - "FAQ"
      - "CTA final + urgência real"

  - id: 2
    etapa: "escrever-copy"
    agente: "copywriter"
    task: "escrever-copy.md"
    skill_externa: "/extrair-design (extrai pattern de referência)"
    saida: "copy.md (headline + subheadline + cada bloco copy + CTAs múltiplos)"

  - id: 3
    etapa: "design-mockup"
    agente: "designer"
    task: "definir-conceito-visual.md"
    saida: "Figma mockup desktop + mobile (responsivo first)"

  - id: 4
    etapa: "dev-html"
    agente: "designer"
    saida: "index.html + CSS + JS mínimo (vanilla OR framework cliente)"
    requisitos:
      - "Performance > 90 Lighthouse"
      - "Mobile-first responsive"
      - "Schema markup (Product/Service/FAQ)"
      - "OG tags + Twitter cards"
      - "Pixel + GTM + GA4 integrados"
      - "Formulário com validation client + server"

  - id: 5
    etapa: "qa-lp"
    agente: "qa"
    task: "validar-landing-page.md"
    checklist:
      - "Responsivo todas resoluções (320, 768, 1280, 1920)"
      - "Performance Lighthouse > 90"
      - "Sem broken links"
      - "Formulário submete + envia dados (teste end-to-end)"
      - "Pixel disparando PageView + Lead"
      - "OG tags renderizam (Facebook Debugger)"
      - "Schema válido (Google Rich Results Test)"
      - "Sem typo + sem placeholder esquecido"
      - "Cores branding corretas"
      - "Acessibilidade básica (alt-text + contrast ratio)"

  - id: 6
    etapa: "publicar"
    agente: "cs"
    saida: "deploy + DNS + SSL ativo + URL final entregue"
    plataformas: ["Vercel", "Netlify", "WordPress", "Webflow", "custom"]

  - id: 7
    etapa: "monitorar-conversao"
    agente: "traffic"
    saida: "conversion rate medida primeiros 7d (input pra ab-test-ciclo se < benchmark)"

metricas:
  prazo: "<= 10d briefing → publicada"
  conversion_rate_alvo: ">= 5% (benchmark varia por nicho)"
  lighthouse_alvo: ">= 90"
